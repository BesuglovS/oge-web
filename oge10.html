    <script>
      // Вспомогательные функции для работы с системами счисления
      function toDecimal(numStr, base) {
        return parseInt(numStr, base);
      }

      function fromDecimal(num, base) {
        return num.toString(base).toUpperCase();
      }

      function countOnes(binaryStr) {
        return binaryStr.split("").filter((c) => c === "1").length;
      }

      function isPrime(n) {
        if (n < 2) return false;
        if (n === 2) return true;
        if (n % 2 === 0) return false;
        for (let i = 3; i <= Math.sqrt(n); i += 2) {
          if (n % i === 0) return false;
        }
        return true;
      }

      function generateBinary(bits) {
        let result = "";
        for (let i = 0; i < bits; i++) {
          result += Math.random() < 0.5 ? "0" : "1";
        }
        // Убеждаемся, что число не начинается с 0
        if (result[0] === "0") {
          result = "1" + result.slice(1);
        }
        return result;
      }

      function generateOctal(digits) {
        const octalDigits = "01234567";
        let result = "";
        for (let i = 0; i < digits; i++) {
          if (i === 0) {
            result += octalDigits[Math.floor(Math.random() * 7) + 1];
          } else {
            result += octalDigits[Math.floor(Math.random() * 8)];
          }
        }
        return result;
      }

      function generateHex(digits) {
        const hexDigits = "0123456789ABCDEF";
        let result = "";
        for (let i = 0; i < digits; i++) {
          if (i === 0) {
            result += hexDigits[Math.floor(Math.random() * 15) + 1];
          } else {
            result += hexDigits[Math.floor(Math.random() * 16)];
          }
        }
        return result;
      }

      function formatNumber(num, base) {
        return `<span class="number-block">${num}<span class="base">${base}</span></span>`;
      }

      let currentTask = null;

      // Типы задач
      const taskTypes = [
        "convertToBinary",
        "convertFromBinary",
        "arithmeticSimple",
        "arithmeticComplex",
        "compareTwoSmallest",
        "compareTwoLargest",
        "findMaxEven",
        "findMinOdd",
        "findMaxDivisible",
        "findMinDivisible",
        "findMaxPrime",
        "findMinPrime",
        "findMinBase",
      ];

      function generateTask() {
        const taskType =
          taskTypes[Math.floor(Math.random() * taskTypes.length)];

        switch (taskType) {
          case "convertToBinary":
            return generateConvertToBinary();
          case "convertFromBinary":
            return generateConvertFromBinary();
          case "arithmeticSimple":
            return generateArithmeticSimple();
          case "arithmeticComplex":
            return generateArithmeticComplex();
          case "compareTwoSmallest":
            return generateCompareTwo("smallest");
          case "compareTwoLargest":
            return generateCompareTwo("largest");
          case "findMaxEven":
            return generateFindCondition("max", "even");
          case "findMinOdd":
            return generateFindCondition("min", "odd");
          case "findMaxDivisible":
            return generateFindDivisible("max");
          case "findMinDivisible":
            return generateFindDivisible("min");
          case "findMaxPrime":
            return generateFindPrime("max");
          case "findMinPrime":
            return generateFindPrime("min");
          case "findMinBase":
            return generateFindMinBase();
        }
      }

      // Задача: перевод в двоичную и подсчёт единиц
      function generateConvertToBinary() {
        const decimalNum = Math.floor(Math.random() * 500) + 100;
        const binaryNum = fromDecimal(decimalNum, 2);
        const ones = countOnes(binaryNum);

        currentTask = {
          answer: ones.toString(),
          taskType: "convert",
          hint: `Переведите число ${decimalNum} в двоичную систему делением на 2, затем подсчитайте количество единиц.`,
          solution: [
            `Переводим число ${decimalNum} в двоичную систему:`,
            `Делим последовательно на 2 и записываем остатки:`,
            getDivisionSteps(decimalNum, 2),
            `Результат: ${binaryNum}<sub>2</sub>`,
            `Количество единиц: ${ones}`,
            `<strong>Ответ: ${ones}</strong>`,
          ],
        };

        const taskText = `
          <p>Переведите число <span class="highlight">${decimalNum}</span> из десятичной системы счисления в двоичную.</p>
          <p>Сколько единиц содержит полученное число?</p>
        `;

        renderTask(taskText, "convert", "Перевод чисел");
      }

      // Задача: перевод из двоичной в десятичную
      function generateConvertFromBinary() {
        const bits = Math.floor(Math.random() * 4) + 6;
        const binaryNum = generateBinary(bits);
        const decimalNum = toDecimal(binaryNum, 2);
        const decimalStr = decimalNum.toString();
        const tensDigit =
          decimalStr.length >= 2 ? decimalStr[decimalStr.length - 2] : "0";

        currentTask = {
          answer: tensDigit,
          taskType: "convert",
          hint: `Переведите число ${binaryNum}₂ в десятичную систему, затем определите цифру в разряде десятков.`,
          solution: [
            `Переводим ${binaryNum}<sub>2</sub> в десятичную систему:`,
            getExpansion(binaryNum, 2),
            `Результат: ${decimalNum}<sub>10</sub>`,
            `Цифра в разряде десятков: ${tensDigit}`,
            `<strong>Ответ: ${tensDigit}</strong>`,
          ],
        };

        const taskText = `
          <p>Переведите число <span class="highlight">${binaryNum}</span> из двоичной системы счисления в десятичную.</p>
          <p>В ответе укажите цифру, стоящую в разряде десятков полученного числа.</p>
        `;

        renderTask(taskText, "convert", "Перевод чисел");
      }

      // Задача: простое арифметическое выражение
      function generateArithmeticSimple() {
        const binary1 = generateBinary(Math.floor(Math.random() * 3) + 5);
        const octal1 = generateOctal(2);
        const hex1 = generateHex(1);

        const dec1 = toDecimal(binary1, 2);
        const dec2 = toDecimal(octal1, 8);
        const dec3 = toDecimal(hex1, 16);

        const result = dec1 + dec2 + dec3;

        currentTask = {
          answer: result.toString(),
          taskType: "arithmetic",
          hint: "Переведите все числа в десятичную систему и выполните сложение.",
          solution: [
            `Переводим все числа в десятичную систему:`,
            `${binary1}<sub>2</sub> = ${getExpansionSimple(binary1, 2)} = ${dec1}<sub>10</sub>`,
            `${octal1}<sub>8</sub> = ${getExpansionSimple(octal1, 8)} = ${dec2}<sub>10</sub>`,
            `${hex1}<sub>16</sub> = ${dec3}<sub>10</sub>`,
            `Вычисляем: ${dec1} + ${dec2} + ${dec3} = ${result}`,
            `<strong>Ответ: ${result}</strong>`,
          ],
        };

        const taskText = `
          <p>Вычислите значение арифметического выражения:</p>
          <div class="numbers-list">
            ${formatNumber(binary1, 2)} + ${formatNumber(octal1, 8)} + ${formatNumber(hex1, 16)}
          </div>
          <p>В ответе запишите число в десятичной системе счисления.</p>
        `;

        renderTask(taskText, "arithmetic", "Арифметика");
      }

      // Задача: сложное арифметическое выражение
      function generateArithmeticComplex() {
        const patterns = [
          {
            generate: () => {
              const bin1 = generateBinary(Math.floor(Math.random() * 3) + 5);
              const oct1 = generateOctal(2);
              const bin2 = generateBinary(4);
              const dec1 = toDecimal(bin1, 2);
              const dec2 = toDecimal(oct1, 8);
              const dec3 = toDecimal(bin2, 2);
              const result = Math.floor((dec1 - dec2) / dec3);
              return {
                expr: `(${formatNumber(bin1, 2)} - ${formatNumber(oct1, 8)}) : ${formatNumber(bin2, 2)}`,
                dec1,
                dec2,
                dec3,
                result,
                steps: [
                  `Переводим все числа в десятичную систему:`,
                  `${bin1}<sub>2</sub> = ${dec1}<sub>10</sub>`,
                  `${oct1}<sub>8</sub> = ${dec2}<sub>10</sub>`,
                  `${bin2}<sub>2</sub> = ${dec3}<sub>10</sub>`,
                  `Вычисляем: (${dec1} - ${dec2}) : ${dec3} = ${dec1 - dec2} : ${dec3} = ${result}`,
                ],
              };
            },
          },
          {
            generate: () => {
              const bin1 = generateBinary(Math.floor(Math.random() * 3) + 6);
              const hex1 = generateHex(2);
              const oct1 = generateOctal(2);
              const dec1 = toDecimal(bin1, 2);
              const dec2 = toDecimal(hex1, 16);
              const dec3 = toDecimal(oct1, 8);
              const result = Math.floor((dec1 - dec2) / dec3);
              return {
                expr: `(${formatNumber(bin1, 2)} - ${formatNumber(hex1, 16)}) : ${formatNumber(oct1, 8)}`,
                dec1,
                dec2,
                dec3,
                result,
                steps: [
                  `Переводим все числа в десятичную систему:`,
                  `${bin1}<sub>2</sub> = ${dec1}<sub>10</sub>`,
                  `${hex1}<sub>16</sub> = ${dec2}<sub>10</sub>`,
                  `${oct1}<sub>8</sub> = ${dec3}<sub>10</sub>`,
                  `Вычисляем: (${dec1} - ${dec2}) : ${dec3} = ${dec1 - dec2} : ${dec3} = ${result}`,
                ],
              };
            },
          },
          {
            generate: () => {
              const bin1 = generateBinary(6);
              const oct1 = generateOctal(2);
              const hex1 = generateHex(2);
              const dec1 = toDecimal(bin1, 2);
              const dec2 = toDecimal(oct1, 8);
              const dec3 = toDecimal(hex1, 16);
              const result = Math.floor(((dec1 + dec2) * dec3) / 16);
              return {
                expr: `(${formatNumber(bin1, 2)} + ${formatNumber(oct1, 8)}) * ${formatNumber(hex1, 16)} : 16`,
                dec1,
                dec2,
                dec3,
                result,
                steps: [
                  `Переводим все числа в десятичную систему:`,
                  `${bin1}<sub>2</sub> = ${dec1}<sub>10</sub>`,
                  `${oct1}<sub>8</sub> = ${dec2}<sub>10</sub>`,
                  `${hex1}<sub>16</sub> = ${dec3}<sub>10</sub>`,
                  `Вычисляем: (${dec1} + ${dec2}) * ${dec3} : 16 = ${dec1 + dec2} * ${dec3} : 16 = ${result}`,
                ],
              };
            },
          },
        ];

        const pattern = patterns[Math.floor(Math.random() * patterns.length)];
        const data = pattern.generate();

        // Убеждаемся, что результат положительный
        if (data.result < 1) {
          return generateArithmeticComplex();
        }

        currentTask = {
          answer: data.result.toString(),
          taskType: "arithmetic",
          hint: "Переведите все числа в десятичную систему и выполните вычисления.",
          solution: [...data.steps, `<strong>Ответ: ${data.result}</strong>`],
        };

        const taskText = `
          <p>Вычислите значение арифметического выражения:</p>
          <div class="numbers-list">${data.expr}</div>
          <p>В ответе запишите число в десятичной системе счисления.</p>
        `;

        renderTask(taskText, "arithmetic", "Арифметика");
      }

      // Задача: сравнение чисел (найти два наибольших/наименьших)
      function generateCompareTwo(type) {
        const num1 = { hex: generateHex(2), base: 16 };
        const num2 = { hex: generateOctal(3), base: 8 };
        const num3 = { hex: generateBinary(8), base: 2 };

        const nums = [num1, num2, num3].map((n) => ({
          ...n,
          decimal: toDecimal(n.hex, n.base),
        }));

        // Проверяем, что все три числа различны
        if (
          nums[0].decimal === nums[1].decimal ||
          nums[0].decimal === nums[2].decimal ||
          nums[1].decimal === nums[2].decimal
        ) {
          return generateCompareTwo(type);
        }

        nums.sort((a, b) => a.decimal - b.decimal);

        let answer, selected;
        if (type === "smallest") {
          selected = [nums[0], nums[1]];
          answer = nums[0].decimal + nums[1].decimal;
        } else {
          selected = [nums[1], nums[2]];
          answer = nums[1].decimal + nums[2].decimal;
        }

        currentTask = {
          answer: answer.toString(),
          taskType: "compare",
          hint: "Переведите все числа в десятичную систему и сравните их.",
          solution: [
            `Переводим все числа в десятичную систему:`,
            ...nums.map(
              (n) => `${n.hex}<sub>${n.base}</sub> = ${n.decimal}<sub>10</sub>`,
            ),
            `Упорядочиваем: ${nums.map((n) => n.decimal).join(" < ")}`,
            type === "smallest"
              ? `Два наименьших: ${nums[0].decimal} и ${nums[1].decimal}`
              : `Два наибольших: ${nums[1].decimal} и ${nums[2].decimal}`,
            `Сумма: ${answer}`,
            `<strong>Ответ: ${answer}</strong>`,
          ],
        };

        const taskText = `
          <p>Среди приведённых ниже трёх чисел, записанных в разных системах счисления, найдите два ${type === "smallest" ? "наименьших" : "наибольших"} и запишите в ответе их сумму в десятичной системе счисления.</p>
          <div class="numbers-list">
            ${formatNumber(num1.hex, 16)}, ${formatNumber(num2.hex, 8)}, ${formatNumber(num3.hex, 2)}
          </div>
        `;

        renderTask(taskText, "compare", "Сравнение чисел");
      }

      // Задача: найти число по условию (чётное/нечётное)
      function generateFindCondition(extremum, condition) {
        const generateNum = () => {
          const bases = [
            { gen: () => generateHex(2), base: 16 },
            { gen: () => generateOctal(3), base: 8 },
            { gen: () => generateBinary(8), base: 2 },
          ];
          const b = bases[Math.floor(Math.random() * bases.length)];
          return { hex: b.gen(), base: b.base };
        };

        const nums = [generateNum(), generateNum(), generateNum()].map((n) => ({
          ...n,
          decimal: toDecimal(n.hex, n.base),
        }));

        // Проверяем, что все три числа различны
        if (
          nums[0].decimal === nums[1].decimal ||
          nums[0].decimal === nums[2].decimal ||
          nums[1].decimal === nums[2].decimal
        ) {
          return generateFindCondition(extremum, condition);
        }

        const filtered = nums.filter((n) =>
          condition === "even" ? n.decimal % 2 === 0 : n.decimal % 2 === 1,
        );

        if (filtered.length === 0) {
          return generateFindCondition(extremum, condition);
        }

        filtered.sort((a, b) =>
          extremum === "max" ? b.decimal - a.decimal : a.decimal - b.decimal,
        );

        const answer = filtered[0].decimal;

        currentTask = {
          answer: answer.toString(),
          taskType: "compare",
          hint: `Переведите числа в десятичную систему, найдите ${condition === "even" ? "чётные" : "нечётные"} и выберите ${extremum === "max" ? "максимальное" : "минимальное"}.`,
          solution: [
            `Переводим все числа в десятичную систему:`,
            ...nums.map(
              (n) =>
                `${n.hex}<sub>${n.base}</sub> = ${n.decimal}<sub>10</sub> (${n.decimal % 2 === 0 ? "чётное" : "нечётное"})`,
            ),
            condition === "even"
              ? `Чётные числа: ${filtered.map((f) => f.decimal).join(", ")}`
              : `Нечётные числа: ${filtered.map((f) => f.decimal).join(", ")}`,
            `${extremum === "max" ? "Максимальное" : "Минимальное"}: ${answer}`,
            `<strong>Ответ: ${answer}</strong>`,
          ],
        };

        const taskText = `
          <p>Среди приведённых ниже трёх чисел, записанных в разных системах счисления, найдите ${extremum === "max" ? "максимальное" : "минимальное"} ${condition === "even" ? "чётное" : "нечётное"} число и запишите в ответе его в десятичной системе счисления.</p>
          <div class="numbers-list">
            ${formatNumber(nums[0].hex, nums[0].base)}, ${formatNumber(nums[1].hex, nums[1].base)}, ${formatNumber(nums[2].hex, nums[2].base)}
          </div>
        `;

        renderTask(taskText, "compare", "Поиск по условию");
      }

      // Задача: найти число, делящееся на N
      function generateFindDivisible(extremum) {
        const divisors = [3, 5];
        const divisor = divisors[Math.floor(Math.random() * divisors.length)];

        const generateNum = () => {
          const bases = [
            { gen: () => generateHex(2), base: 16 },
            { gen: () => generateOctal(3), base: 8 },
            { gen: () => generateBinary(8), base: 2 },
          ];
          const b = bases[Math.floor(Math.random() * bases.length)];
          return { hex: b.gen(), base: b.base };
        };

        const nums = [generateNum(), generateNum(), generateNum()].map((n) => ({
          ...n,
          decimal: toDecimal(n.hex, n.base),
        }));

        // Проверяем, что все три числа различны
        if (
          nums[0].decimal === nums[1].decimal ||
          nums[0].decimal === nums[2].decimal ||
          nums[1].decimal === nums[2].decimal
        ) {
          return generateFindDivisible(extremum);
        }

        const filtered = nums.filter((n) => n.decimal % divisor === 0);

        if (filtered.length === 0) {
          return generateFindDivisible(extremum);
        }

        filtered.sort((a, b) =>
          extremum === "max" ? b.decimal - a.decimal : a.decimal - b.decimal,
        );

        const answer = filtered[0].decimal;

        currentTask = {
          answer: answer.toString(),
          taskType: "compare",
          hint: `Переведите числа в десятичную систему и найдите те, которые делятся на ${divisor}.`,
          solution: [
            `Переводим все числа в десятичную систему:`,
            ...nums.map(
              (n) =>
                `${n.hex}<sub>${n.base}</sub> = ${n.decimal}<sub>10</sub> (${n.decimal % divisor === 0 ? `делится на ${divisor}` : `не делится на ${divisor}`})`,
            ),
            `Числа, делящиеся на ${divisor}: ${filtered.map((f) => f.decimal).join(", ")}`,
            `${extremum === "max" ? "Максимальное" : "Минимальное"}: ${answer}`,
            `<strong>Ответ: ${answer}</strong>`,
          ],
        };

        const taskText = `
          <p>Среди приведённых ниже трёх чисел, записанных в разных системах счисления, найдите ${extremum === "max" ? "максимальное" : "минимальное"} число, делящееся на <span class="highlight">${divisor}</span>, и запишите в ответе его в десятичной системе счисления.</p>
          <div class="numbers-list">
            ${formatNumber(nums[0].hex, nums[0].base)}, ${formatNumber(nums[1].hex, nums[1].base)}, ${formatNumber(nums[2].hex, nums[2].base)}
          </div>
        `;

        renderTask(taskText, "compare", "Делимость чисел");
      }

      // Задача: найти простое число
      function generateFindPrime(extremum) {
        const generateNum = () => {
          const bases = [
            { gen: () => generateHex(2), base: 16 },
            { gen: () => generateOctal(2), base: 8 },
            { gen: () => generateBinary(6), base: 2 },
          ];
          const b = bases[Math.floor(Math.random() * bases.length)];
          return { hex: b.gen(), base: b.base };
        };

        const nums = [generateNum(), generateNum(), generateNum()].map((n) => ({
          ...n,
          decimal: toDecimal(n.hex, n.base),
        }));

        // Проверяем, что все три числа различны
        if (
          nums[0].decimal === nums[1].decimal ||
          nums[0].decimal === nums[2].decimal ||
          nums[1].decimal === nums[2].decimal
        ) {
          return generateFindPrime(extremum);
        }

        const filtered = nums.filter((n) => isPrime(n.decimal));

        if (filtered.length === 0) {
          return generateFindPrime(extremum);
        }

        filtered.sort((a, b) =>
          extremum === "max" ? b.decimal - a.decimal : a.decimal - b.decimal,
        );

        const answer = filtered[0].decimal;

        currentTask = {
          answer: answer.toString(),
          taskType: "compare",
          hint: "Переведите числа в десятичную систему и проверьте каждое на простоту.",
          solution: [
            `Переводим все числа в десятичную систему:`,
            ...nums.map(
              (n) =>
                `${n.hex}<sub>${n.base}</sub> = ${n.decimal}<sub>10</sub> (${isPrime(n.decimal) ? "простое" : "не простое"})`,
            ),
            `Простые числа: ${filtered.map((f) => f.decimal).join(", ")}`,
            `${extremum === "max" ? "Максимальное" : "Минимальное"}: ${answer}`,
            `<strong>Ответ: ${answer}</strong>`,
          ],
        };

        const taskText = `
          <p>Среди приведённых ниже трёх чисел, записанных в разных системах счисления, найдите ${extremum === "max" ? "максимальное" : "минимальное"} простое число и запишите в ответе его в десятичной системе счисления.</p>
          <div class="numbers-list">
            ${formatNumber(nums[0].hex, nums[0].base)}, ${formatNumber(nums[1].hex, nums[1].base)}, ${formatNumber(nums[2].hex, nums[2].base)}
          </div>
        `;

        renderTask(taskText, "compare", "Простые числа");
      }

      // Задача: найти минимальное основание
      function generateFindMinBase() {
        const patterns = [
          { digits: "2345", maxDigit: 5 },
          { digits: "3456", maxDigit: 6 },
          { digits: "1234", maxDigit: 4 },
          { digits: "4567", maxDigit: 7 },
          { digits: "2233", maxDigit: 3 },
          { digits: "1177", maxDigit: 7 },
          { digits: "1551", maxDigit: 5 },
          { digits: "1717", maxDigit: 7 },
        ];

        const pattern = patterns[Math.floor(Math.random() * patterns.length)];
        const minBase = pattern.maxDigit + 1;

        // Генерируем число с заданным паттерном
        let numStr = pattern.digits;

        // Переводим в десятичную систему
        const decimal = parseInt(numStr, minBase);

        currentTask = {
          answer: decimal.toString(),
          taskType: "base",
          hint: `Минимальное основание системы счисления на 1 больше максимальной цифры в числе.`,
          solution: [
            `Максимальная цифра в числе ${numStr}: ${pattern.maxDigit}`,
            `Минимальное основание: ${pattern.maxDigit} + 1 = ${minBase}`,
            `Переводим ${numStr}<sub>${minBase}</sub> в десятичную систему:`,
            getExpansion(numStr, minBase),
            `Результат: ${decimal}`,
            `<strong>Ответ: ${decimal}</strong>`,
          ],
        };

        const taskText = `
          <p>Число <span class="highlight">${numStr}<sub>n</sub></span> записано в системе счисления с основанием n > 1.</p>
          <p>Определите наименьшее n. Для этого значения n запишите представление этого числа в десятичной системе счисления.</p>
        `;

        renderTask(taskText, "base", "Основание системы");
      }

      // Вспомогательные функции для решения
      function getDivisionSteps(num, base) {
        let steps = [];
        let n = num;
        while (n > 0) {
          const quotient = Math.floor(n / base);
          const remainder = n % base;
          steps.push(`${n} ÷ ${base} = ${quotient}, остаток ${remainder}`);
          n = quotient;
        }
        return steps.join("<br>");
      }

      function getExpansion(numStr, base) {
        let terms = [];
        let power = numStr.length - 1;
        for (let i = 0; i < numStr.length; i++) {
          const digit = parseInt(numStr[i], base);
          terms.push(`${digit}·${base}<sup>${power}</sup>`);
          power--;
        }
        return terms.join(" + ");
      }

      function getExpansionSimple(numStr, base) {
        let result = 0;
        let terms = [];
        for (let i = 0; i < numStr.length; i++) {
          const digit = parseInt(numStr[i], base);
          const power = numStr.length - 1 - i;
          if (digit > 0) {
            terms.push(`${digit}·${base}<sup>${power}</sup>`);
            result += digit * Math.pow(base, power);
          }
        }
        return terms.join(" + ") || "0";
      }

      function renderTask(taskText, typeClass, typeName) {
        const taskCard = document.getElementById("taskCard");

        taskCard.innerHTML = `
          <div class="task-header">
            <span class="task-type ${typeClass}">${typeName}</span>
          </div>
          <div class="task-text">${taskText}</div>
          <div class="answer-section">
            <label class="answer-label">Ваш ответ:</label>
            <input type="text" class="answer-input" id="answerInput" placeholder="Введите число..." autocomplete="off">
            <div class="buttons">
              <button class="btn btn-check" onclick="checkAnswer()">✓ Проверить</button>
              <button class="btn btn-next" onclick="nextTask()">🔄 Новая задача</button>
              <button class="btn btn-hint" onclick="showHint()">💡 Подсказка</button>
              <button class="btn btn-solution" onclick="showSolution()">📝 Решение</button>
            </div>
            <div class="result" id="result"></div>
          </div>
        `;

        document
          .getElementById("answerInput")
          .addEventListener("keypress", function (e) {
            if (e.key === "Enter") {
              checkAnswer();
            }
          });

        document.getElementById("answerInput").focus();
      }

      function checkAnswer() {
        const input = document.getElementById("answerInput");
        const result = document.getElementById("result");
        const userAnswer = input.value.trim();
        const correctAnswer = currentTask.answer;

        if (!userAnswer) {
          input.focus();
          return;
        }

        if (userAnswer === correctAnswer) {
          input.classList.remove("incorrect");
          input.classList.add("correct");
          result.className = "result correct";
          result.innerHTML = "✅ Правильно! Отличная работа!";
        } else {
          input.classList.remove("correct");
          input.classList.add("incorrect");
          result.className = "result incorrect";
          result.innerHTML = `❌ Неправильно. Правильный ответ: <strong>${currentTask.answer}</strong>`;
        }
      }

      function nextTask() {
        hideHintsAndSolution();
        generateTask();
      }

      function hideHintsAndSolution() {
        document.getElementById("hintBox").style.display = "none";
        document.getElementById("solutionBox").style.display = "none";
      }

      function showHint() {
        const hintBox = document.getElementById("hintBox");
        const hintText = document.getElementById("hintText");
        hintText.innerHTML = currentTask.hint;
        hintBox.style.display = "block";
      }

      function showSolution() {
        const solutionBox = document.getElementById("solutionBox");
        const solutionSteps = document.getElementById("solutionSteps");
        solutionSteps.innerHTML = currentTask.solution
          .map((step) => `<div class="solution-step">${step}</div>`)
          .join("");
        solutionBox.style.display = "block";
      }

      function scrollToTop() {
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      // Инициализация
      generateTask();
    </script>

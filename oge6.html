    <script>
      // Генераторы задач
      const taskGenerators = [
        // Тип 1: Подсчёт запусков с операцией mod
        {
          type: "count",
          generate: () => {
            const divisor = [5, 7, 9, 11, 12][Math.floor(Math.random() * 5)];
            const pairs = generatePairsForMod(divisor);
            const answer = countYesMod(pairs, divisor);

            return {
              taskType: "count",
              condition: "mod",
              divisor: divisor,
              pairs: pairs,
              answer: answer,
            };
          },
        },
        // Тип 2: Подсчёт запусков с логическим OR
        {
          type: "count",
          generate: () => {
            const threshold = Math.floor(Math.random() * 3) + 3; // 3-5
            const pairs = generatePairsForOr(threshold);
            const answer = countYesOr(pairs, threshold);

            return {
              taskType: "count",
              condition: "or",
              threshold: threshold,
              pairs: pairs,
              answer: answer,
            };
          },
        },
        // Тип 3: Подсчёт запусков с логическим AND
        {
          type: "count",
          generate: () => {
            const thresholdS = Math.floor(Math.random() * 5) + 5; // 5-9
            const thresholdT = Math.floor(Math.random() * 3) + 3; // 3-5
            const pairs = generatePairsForAnd(thresholdS, thresholdT);
            const answer = countYesAnd(pairs, thresholdS, thresholdT);

            return {
              taskType: "count",
              condition: "and",
              thresholdS: thresholdS,
              thresholdT: thresholdT,
              pairs: pairs,
              answer: answer,
            };
          },
        },
        // Тип 3b: Подсчёт запусков с NO (mod)
        {
          type: "count",
          generate: () => {
            const divisor = [5, 7, 9, 11, 12][Math.floor(Math.random() * 5)];
            const pairs = generatePairsForMod(divisor);
            const yesCount = countYesMod(pairs, divisor);
            const answer = 10 - yesCount; // NO = все - YES

            return {
              taskType: "count",
              condition: "mod",
              divisor: divisor,
              pairs: pairs,
              answer: answer,
              countType: "no", // подсчёт NO вместо YES
            };
          },
        },
        // Тип 3c: Подсчёт запусков с NO (or)
        {
          type: "count",
          generate: () => {
            const threshold = Math.floor(Math.random() * 3) + 3; // 3-5
            const pairs = generatePairsForOr(threshold);
            const yesCount = countYesOr(pairs, threshold);
            const answer = 10 - yesCount;

            return {
              taskType: "count",
              condition: "or",
              threshold: threshold,
              pairs: pairs,
              answer: answer,
              countType: "no",
            };
          },
        },
        // Тип 4: Определение параметра A (наименьшее)
        {
          type: "parameter",
          generate: () => {
            const targetYes = Math.floor(Math.random() * 3) + 4; // 4-6
            const pairs = generatePairsForParameter();
            const result = findParameterA(pairs, targetYes, "min");

            if (!result) return null;

            return {
              taskType: "parameter",
              pairs: pairs,
              targetYes: targetYes,
              answer: result.answer,
              findType: "min",
              condition: "and",
            };
          },
        },
        // Тип 5: Определение параметра A (наибольшее)
        {
          type: "parameter",
          generate: () => {
            const targetYes = Math.floor(Math.random() * 3) + 3; // 3-5
            const pairs = generatePairsForParameter2();
            const result = findParameterA2(pairs, targetYes, "max");

            if (!result) return null;

            return {
              taskType: "parameter",
              pairs: pairs,
              targetYes: targetYes,
              answer: result.answer,
              findType: "max",
              condition: "or",
            };
          },
        },
      ];

      // Вспомогательные функции

      function generatePairsForMod(divisor) {
        const pairs = [];
        const used = new Set();

        // Генерируем 10 пар
        while (pairs.length < 10) {
          const s = Math.floor(Math.random() * 50) + 1;
          const t = Math.floor(Math.random() * divisor);
          const key = `${s},${t}`;
          if (!used.has(key)) {
            used.add(key);
            pairs.push({ s, t });
          }
        }

        return pairs;
      }

      function countYesMod(pairs, divisor) {
        let count = 0;
        for (const pair of pairs) {
          if (pair.s % divisor === pair.t) {
            count++;
          }
        }
        return count;
      }

      function generatePairsForOr(threshold) {
        const pairs = [];
        const used = new Set();

        while (pairs.length < 10) {
          const s = Math.floor(Math.random() * 10) - 5; // -5 до 4
          const t = Math.floor(Math.random() * 10) - 5;
          const key = `${s},${t}`;
          if (!used.has(key)) {
            used.add(key);
            pairs.push({ s, t });
          }
        }

        return pairs;
      }

      function countYesOr(pairs, threshold) {
        let count = 0;
        for (const pair of pairs) {
          if (Math.abs(pair.s) < threshold || Math.abs(pair.t) < threshold) {
            count++;
          }
        }
        return count;
      }

      function generatePairsForAnd(thresholdS, thresholdT) {
        const pairs = [];
        const used = new Set();

        while (pairs.length < 10) {
          const s = Math.floor(Math.random() * 20) - 5; // -5 до 14
          const t = Math.floor(Math.random() * 20) - 10; // -10 до 9
          const key = `${s},${t}`;
          if (!used.has(key)) {
            used.add(key);
            pairs.push({ s, t });
          }
        }

        return pairs;
      }

      function countYesAnd(pairs, thresholdS, thresholdT) {
        let count = 0;
        for (const pair of pairs) {
          if (pair.s > thresholdS && pair.t < thresholdT) {
            count++;
          }
        }
        return count;
      }

      function generatePairsForParameter() {
        // Генерируем пары для задачи с параметром A
        // Условие: (s >= A) and (t < 1)
        // Важно: все s среди пар с t < 1 должны быть уникальными
        const pairs = [
          { s: -8, t: -11 }, // t < 1, s = -8
          { s: 1, t: -20 }, // t < 1, s = 1
          { s: 4, t: -37 }, // t < 1, s = 4
          { s: 7, t: 46 }, // t >= 1, не подходит
          { s: 15, t: -14 }, // t < 1, s = 15
          { s: 30, t: -4 }, // t < 1, s = 30
          { s: 30, t: 15 }, // t >= 1, не подходит
          { s: 50, t: -30 }, // t < 1, s = 50
          { s: 80, t: -3 }, // t < 1, s = 80
          { s: 100, t: -5 }, // t < 1, s = 100
        ];
        // Уникальные s среди пар с t < 1: -8, 1, 4, 15, 30, 50, 80, 100 (8 значений)

        // Перемешиваем пары
        return shuffleArray([...pairs]);
      }

      function generatePairsForParameter2() {
        // Генерируем пары для задачи с параметром A
        // Условие: (s < A) or (t < A)
        // Важно: все min(s, t) должны быть уникальными для корректного решения
        const pairs = [
          { s: 25, t: 5 }, // min = 5
          { s: 8, t: 8 }, // min = 8
          { s: 20, t: 10 }, // min = 10
          { s: 22, t: 12 }, // min = 12
          { s: 15, t: 25 }, // min = 15
          { s: 18, t: 22 }, // min = 18
          { s: 10, t: 20 }, // min = 10 - дубликат, исправим
          { s: 30, t: 30 }, // min = 30
          { s: 5, t: 35 }, // min = 5 - дубликат, исправим
          { s: 12, t: 28 }, // min = 12 - дубликат, исправим
        ];

        // Исправленные пары с уникальными min значениями

          { s: 25, t: 5 }, // min = 5

        ];

        // Финальный набор с уникальными min: 3, 5, 7, 8, 10, 12, 14, 15, 18, 20
        const finalPairs = [

      function findParameterA(pairs, targetYes, findType) {
        // Условие: (s >= A) and (t < 1)
        // Сначала фильтруем пары, где t < 1
        const validPairs = pairs.filter((p) => p.t < 1);

        // Сортируем по s
        const sortedS = validPairs.map((p) => p.s).sort((a, b) => a - b);

        // Нам нужно ровно targetYes пар с s >= A
        // Это значит A должно быть таким, чтобы ровно targetYes пар удовлетворяли s >= A
        // Граница: sortedS[validPairs.length - targetYes] - минимальное s из выбранных пар
        // Но A может быть любым от (предыдущее s + 1) до этого s
        // Для наименьшего A: A = sortedS[validPairs.length - targetYes - 1] + 1
        // (на единицу больше предыдущего значения s)

        if (sortedS.length < targetYes) return null;

        const idx = sortedS.length - targetYes;

        // Наименьшее A должно быть больше предыдущего s (чтобы не включить лишнюю пару)
        // и может быть любым до sortedS[idx] включительно
        if (idx > 0) {
          // A должно быть > sortedS[idx - 1] и <= sortedS[idx]
          // Наименьшее целое A = sortedS[idx - 1] + 1
          const answer = sortedS[idx - 1] + 1;
          return { answer };
        } else {
          // idx = 0, значит нужно targetYes = validPairs.length пар
          // A может быть любым <= sortedS[0]
          // Наименьшее целое A не ограничено снизу, берём минимальное разумное
          const answer = sortedS[0];
          return { answer };
        }
      }

      function findParameterA2(pairs, targetYes, findType) {
        // Условие: (s < A) or (t < A)
        // Для каждой пары условие истинно, если min(s, t) < A

        const minValues = pairs.map((p) => Math.min(p.s, p.t));
        minValues.sort((a, b) => a - b);

        // Нам нужно ровно targetYes пар, где условие истинно (min(s, t) < A)
        // Для наибольшего A: A должно быть таким, чтобы ровно targetYes пар имели min < A
        // Это значит A = minValues[targetYes] (следующее значение после targetYes-го)
        // Тогда min < A будет верно ровно для targetYes пар (индексы 0..targetYes-1)

        if (targetYes >= minValues.length) return null;

        const answer = minValues[targetYes];

        return { answer };
      }

      function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
      }

          currentTask.pairs.forEach((pair, idx) => {
            const condS = pair.s > currentTask.thresholdS;
            const condT = pair.t < currentTask.thresholdT;
            const isYes = condS && condT;
            if (isYes) yesCount++;

            html += `
              <tr>
                <td>${idx + 1}</td>
                <td>${pair.s}</td>
                <td>${pair.t}</td>
                <td>${condS ? "✓" : "✗"}</td>
                <td>${condT ? "✓" : "✗"}</td>
                <td>${isYes ? "✓" : "✗"}</td>
                <td class="${isYes ? "yes" : "no"}">${isYes ? "YES" : "NO"}</td>
              </tr>
            `;
          });

          html += `</table>`;
          html += `<div class="solution-step"><strong>Количество «YES»: ${yesCount}</strong></div>`;
        }

        html += `
          <div class="solution-step" style="background: #e8f5e9; border-left-color: #4caf50;">
            <strong>Ответ: ${currentTask.answer}</strong>
          </div>
        `;

        return html;
      }

      function generateParameterSolution() {
        let html = "";

        if (currentTask.condition === "and") {
          html = `
            <div class="solution-step">
              <strong>Условие: (s >= A) and (t < 1)</strong><br>
              Для вывода «YES» должны выполняться ОБА условия.
            </div>
            <div class="solution-step">
              <strong>Шаг 1:</strong> Отберём пары, где t < 1:
            </div>
            <table class="trace-table">
              <tr>
                <th>№</th>
                <th>s</th>
                <th>t</th>
                <th>t < 1?</th>
                <th>s >= A?</th>
              </tr>
          `;

          currentTask.pairs.forEach((pair, idx) => {
            const tCond = pair.t < 1;
            html += `
              <tr>
                <td>${idx + 1}</td>
                <td>${pair.s}</td>
                <td>${pair.t}</td>
                <td>${tCond ? "✓" : "✗"}</td>
                <td>${tCond ? `A ≤ ${pair.s}` : "—"}</td>
              </tr>
            `;
          });

          html += `</table>`;

          const validPairs = currentTask.pairs.filter((p) => p.t < 1);
          const sortedS = validPairs.map((p) => p.s).sort((a, b) => a - b);

          // Вычисляем границу для A
          const idx = sortedS.length - currentTask.targetYes;
          const prevS = idx > 0 ? sortedS[idx - 1] : null;
          const minSelectedS = sortedS[idx];

          html += `
            <div class="solution-step">
              <strong>Шаг 2:</strong> Пары с t < 1: ${validPairs.length}<br>
              Значения s (отсортированные): ${sortedS.join(", ")}
            </div>
            <div class="solution-step">
              <strong>Шаг 3:</strong> Нужно ровно ${currentTask.targetYes} «YES».<br>
              Для каждого YES нужно s ≥ A.<br>
              Выбираем ${currentTask.targetYes} наибольших значений s: ${sortedS.slice(-currentTask.targetYes).join(", ")}.<br>
              ${
                prevS !== null
                  ? `Чтобы ровно ${currentTask.targetYes} пар дали YES, A должно быть > ${prevS} (чтобы исключить пару с s = ${prevS}).<br>
                     Наименьшее целое A = ${prevS} + 1 = ${currentTask.answer}`
                  : `A может быть любым ≤ ${minSelectedS}. Наименьшее A = ${currentTask.answer}`
              }
            </div>
          `;
        } else if (currentTask.condition === "or") {
          html = `
            <div class="solution-step">
              <strong>Условие: (s < A) or (t < A)</strong><br>
              Для вывода «YES» достаточно выполнения ОДНОГО из условий.<br>
              Условие истинно, если min(s, t) < A.
            </div>
            <table class="trace-table">
              <tr>
                <th>№</th>
                <th>s</th>
                <th>t</th>
                <th>min(s, t)</th>
                <th>min < A?</th>
              </tr>
          `;

          currentTask.pairs.forEach((pair, idx) => {
            const minVal = Math.min(pair.s, pair.t);
            html += `
              <tr>
                <td>${idx + 1}</td>
                <td>${pair.s}</td>
                <td>${pair.t}</td>
                <td>${minVal}</td>
                <td>${minVal} < A</td>
              </tr>
            `;
          });

          html += `</table>`;

          const minValues = currentTask.pairs
            .map((p) => Math.min(p.s, p.t))
            .sort((a, b) => a - b);

          html += `
            <div class="solution-step">
              <strong>Шаг 2:</strong> min(s, t) для каждой пары (отсортированные):<br>
              ${minValues.join(", ")}
            </div>
            <div class="solution-step">
              <strong>Шаг 3:</strong> Нужно ровно ${currentTask.targetYes} «YES».<br>
              Условие min(s, t) < A истинно для пар, где min меньше A.<br>
              Для наибольшего A: A = ${minValues[currentTask.targetYes]} (следующее значение после ${currentTask.targetYes}-го минимального).<br>
              Тогда min < ${currentTask.answer} верно ровно для ${currentTask.targetYes} пар (с min = ${minValues.slice(0, currentTask.targetYes).join(", ")}).
            </div>
          `;
        }

        html += `
          <div class="solution-step" style="background: #e8f5e9; border-left-color: #4caf50;">
            <strong>Ответ: ${currentTask.answer}</strong>
          </div>
        `;

        return html;
      }

      function hideHintsAndSolution() {
        document.getElementById("hintBox").style.display = "none";
        document.getElementById("solutionBox").style.display = "none";
        document.getElementById("result").style.display = "none";
        const input = document.getElementById("answerInput");
        if (input) {
          input.classList.remove("correct", "incorrect");
          input.value = "";
        }
      }

      function scrollToTop() {
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      // Переключение языка программирования
      function switchLanguage(lang) {
        const pascalBlock = document.getElementById("code-pascal");
        const pythonBlock = document.getElementById("code-python");
        const tabs = document.querySelectorAll(".lang-tab");

        tabs.forEach((tab) => tab.classList.remove("active"));

        if (lang === "pascal") {
          pascalBlock.classList.add("active");
          pythonBlock.classList.remove("active");
          tabs[0].classList.add("active");
        } else {
          pythonBlock.classList.add("active");
          pascalBlock.classList.remove("active");
          tabs[1].classList.add("active");
        }
      }

      // Инициализация интерактивных кнопок пар чисел
      function initPairButtons() {
        const container = document.getElementById("pairsContainer");
        if (!container) return;

        const buttons = container.querySelectorAll(".pair-btn");
        const yesCountEl = document.getElementById("yesCount");
        const noCountEl = document.getElementById("noCount");

        buttons.forEach((btn) => {
          btn.addEventListener("click", function () {
            // Цикл переключения: нейтральный -> yes -> no -> нейтральный
            if (this.classList.contains("yes")) {
              this.classList.remove("yes");
              this.classList.add("no");
            } else if (this.classList.contains("no")) {
              this.classList.remove("no");
            } else {
              this.classList.add("yes");
            }

            // Обновляем счётчики
            updateCounters(container, yesCountEl, noCountEl);
          });
        });
      }

      function updateCounters(container, yesCountEl, noCountEl) {
        const yesButtons = container.querySelectorAll(".pair-btn.yes");
        const noButtons = container.querySelectorAll(".pair-btn.no");

        if (yesCountEl) yesCountEl.textContent = yesButtons.length;
        if (noCountEl) noCountEl.textContent = noButtons.length;
      }

      // Инициализация
      generateTask();
    </script>
  </body>
</html>

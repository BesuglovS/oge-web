    <script>
      // Русские буквы для вершин (без Ё, Й, Ъ, Ы, Ь)
      const VERTEX_NAMES = [
        "А",
        "Б",
        "В",
        "Г",
        "Д",
        "Е",
        "Ж",
        "З",
        "И",
        "К",
        "Л",
        "М",
        "Н",
        "П",
        "Р",
      ];

      // Цвета для вершин
      const VERTEX_COLORS = [
        "#e94560",
        "#38ef7d",
        "#667eea",
        "#f5576c",
        "#ffc107",
        "#4caf50",
        "#9c27b0",
        "#00bcd4",
        "#ff5722",
        "#607d8b",
        "#e91e63",
        "#8bc34a",
        "#03a9f4",
        "#ff9800",
        "#795548",
      ];

      let currentTask = null;

      // Генерация случайного целого числа
      function randomInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
      }

      // Генерация ориентированного графа с послойной структурой
      function generateGraph() {
        const vertexCount = randomInt(9, 12);
        const vertices = VERTEX_NAMES.slice(0, vertexCount);

        // Матрица смежности (edges[i][j] = true означает ребро из i в j)
        const edges = [];
        for (let i = 0; i < vertexCount; i++) {
          edges[i] = [];
          for (let j = 0; j < vertexCount; j++) {
            edges[i][j] = false;
          }
        }

        // Распределяем вершины по слоям (не более 5 слоёв)
        // Первый слой: только вершина 0 (А)
        // Последний слой: только последняя вершина
        // Примеры: 1-4-3-1-1, 1-4-4-1, 1-3-1-3-1
        const layers = [];
        layers.push([0]); // Первый слой - только А

        const maxLayers = 5;
        const totalLayers = randomInt(4, maxLayers); // От 4 до 5 слоёв
        const middleLayers = totalLayers - 2; // Промежуточные слои

        let remainingVertices = vertexCount - 2; // Без первой и последней
        let currentVertex = 1;

        // Создаём промежуточные слои
        for (let l = 0; l < middleLayers && remainingVertices > 0; l++) {
          // Распределяем вершины равномерно по слоям
          const layersLeft = middleLayers - l;
          const layerSize = Math.ceil(remainingVertices / layersLeft);

          const layer = [];
          for (
            let i = 0;
            i < layerSize && currentVertex < vertexCount - 1;
            i++
          ) {
            layer.push(currentVertex);
            currentVertex++;
            remainingVertices--;
          }
          if (layer.length > 0) {
            layers.push(layer);
          }
        }

        layers.push([vertexCount - 1]); // Последний слой

        // Генерируем рёбра между соседними слоями
        for (let l = 0; l < layers.length - 1; l++) {
          const currentLayer = layers[l];
          const nextLayer = layers[l + 1];

          // Каждая вершина в текущем слое должна иметь хотя бы одно исходящее ребро
          for (const source of currentLayer) {
            const target = nextLayer[randomInt(0, nextLayer.length - 1)];
            edges[source][target] = true;
          }

          // Каждая вершина в следующем слое должна иметь хотя бы одно входящее ребро
          // Но не обязательно напрямую из предыдущего слоя - может быть через вершину в своём слое
          for (const target of nextLayer) {
            let hasIncoming = false;
            for (const source of currentLayer) {
              if (edges[source][target]) {
                hasIncoming = true;
                break;
              }
            }
            // Если нет прямого ребра, добавляем связь от верхней вершины в этом же слое
            if (!hasIncoming && nextLayer.length > 1) {
              const targetIndex = nextLayer.indexOf(target);
              if (targetIndex > 0) {
                // Связь от верхней вершины в этом же слое
                edges[nextLayer[targetIndex - 1]][target] = true;
              } else {
                // Для первой вершины в слое добавляем связь из предыдущего слоя
                const source =
                  currentLayer[randomInt(0, currentLayer.length - 1)];
                edges[source][target] = true;
              }
            }
          }
        }

        // Иногда добавляем рёбра через слой насквозь
        for (let l = 0; l < layers.length - 2; l++) {
          const currentLayer = layers[l];
          const skipLayer = layers[l + 2];
          for (const source of currentLayer) {
            for (const target of skipLayer) {
              if (Math.random() < 0.15) {
                edges[source][target] = true;
              }
            }
          }
        }

        // Связи между вершинами в одном слое НЕ добавляем
        // так как на маленьком расстоянии стрелки не видны

        return { vertices, edges, vertexCount, layers };
      }

      // Подсчёт количества путей из каждой вершины в конечную
      function calculatePaths(vertices, edges) {
        const n = vertices.length;
        const paths = new Array(n).fill(0);

        // Начальная вершина
        paths[0] = 1;

        // Для каждой вершины считаем количество путей
        for (let i = 1; i < n; i++) {
          let sum = 0;
          for (let j = 0; j < i; j++) {
            if (edges[j][i]) {
              sum += paths[j];
            }
          }
          paths[i] = sum;
        }

        return paths;
      }

      // Подсчёт путей через определённую вершину
      function calculatePathsThrough(vertices, edges, throughIndex, pathsTo) {
        const n = vertices.length;

        // Количество путей от начальной вершины до throughIndex
        const pathsToVertex = pathsTo[throughIndex];

        // Считаем пути от throughIndex до конечной
        const pathsFrom = new Array(n).fill(0);
        pathsFrom[throughIndex] = 1;

        for (let i = throughIndex + 1; i < n; i++) {
          let sum = 0;
          for (let j = throughIndex; j < i; j++) {
            if (edges[j][i]) {
              sum += pathsFrom[j];
            }
          }
          pathsFrom[i] = sum;
        }

        return pathsToVertex * pathsFrom[n - 1];
      }

      // Проверка, что все вершины распределены по слоям
      function validateGraph(graph) {
        const allVertices = new Set();
        for (const layer of graph.layers) {
          for (const v of layer) {
            allVertices.add(v);
          }
        }
        return allVertices.size === graph.vertexCount;
      }

      // Генерация задачи
      function generateTask() {
        let graph, paths;
        // Генерируем граф, пока общее количество путей не будет >= 8 и все вершины распределены
        do {
          graph = generateGraph();
          paths = calculatePaths(graph.vertices, graph.edges);
        } while (paths[graph.vertexCount - 1] < 8 || !validateGraph(graph));

        // Выбираем тип задачи
        const taskType = randomInt(0, 2);

        let question = "";
        let answer = 0;
        let typeClass = "";
        let typeLabel = "";
        let throughVertex = null;
        let throughIndex = -1;

        if (taskType === 0) {
          // Общее количество путей
          question = `Сколько существует различных путей из города ${graph.vertices[0]} в город ${graph.vertices[graph.vertexCount - 1]}?`;
          answer = paths[graph.vertexCount - 1];
          typeClass = "";
          typeLabel = "Общее количество путей";
        } else if (taskType === 1) {
          // Пути через вершину (выбираем вершину не первую и не последнюю)
          throughIndex = randomInt(1, graph.vertexCount - 2);
          throughVertex = graph.vertices[throughIndex];
          answer = calculatePathsThrough(
            graph.vertices,
            graph.edges,
            throughIndex,
            paths,
          );
          question = `Сколько существует различных путей из города ${graph.vertices[0]} в город ${graph.vertices[graph.vertexCount - 1]}, которые проходят через город ${throughVertex}?`;
          typeClass = "through";
          typeLabel = "Пути через вершину";
        } else {
          // Пути не через вершину
          throughIndex = randomInt(1, graph.vertexCount - 2);
          throughVertex = graph.vertices[throughIndex];
          const pathsThrough = calculatePathsThrough(
            graph.vertices,
            graph.edges,
            throughIndex,
            paths,
          );
          answer = paths[graph.vertexCount - 1] - pathsThrough;
          question = `Сколько существует различных путей из города ${graph.vertices[0]} в город ${graph.vertices[graph.vertexCount - 1]}, которые НЕ проходят через город ${throughVertex}?`;
          typeClass = "not-through";
          typeLabel = "Пути не через вершину";
        }

        currentTask = {
          graph: graph,
          paths: paths,
          question: question,
          answer: answer,
          typeClass: typeClass,
          typeLabel: typeLabel,
          throughVertex: throughVertex,
          throughIndex: throughIndex,
        };

        renderTask();
        hideHintsAndSolution();
      }

      // Вычисление координат вершин для отрисовки по слоям
      function calculateVertexPositions(graph, width, height) {
        const positions = [];
        const marginX = 70;
        const marginY = 50;
        const usableWidth = width - 2 * marginX;
        const usableHeight = height - 2 * marginY;

        const layers = graph.layers;
        const layerCount = layers.length;

        // Создаём массив позиций, индекс соответствует индексу вершины
        for (let l = 0; l < layerCount; l++) {
          const layer = layers[l];
          const countInLayer = layer.length;
          const x = marginX + (l / (layerCount - 1 || 1)) * usableWidth;

          for (let i = 0; i < countInLayer; i++) {
            const vertexIndex = layer[i];
            // Минимальное расстояние между вершинами в слое - 70 пикселей
            const minSpacing = 70;
            const naturalSpacing = usableHeight / (countInLayer + 1);
            const spacing = Math.max(minSpacing, naturalSpacing);
            // Центрируем вершины по вертикали
            const totalHeight = (countInLayer - 1) * spacing;
            const startY = (height - totalHeight) / 2;
            const y = startY + i * spacing;
            positions[vertexIndex] = { x: Math.round(x), y: Math.round(y) };
          }
        }

        return positions;
      }

      // Отрисовка задачи
      function renderTask() {
        const taskCard = document.getElementById("taskCard");
        const graph = currentTask.graph;

        // Вычисляем высоту SVG в зависимости от максимального количества вершин в слое
        const maxVerticesInLayer = Math.max(
          ...graph.layers.map((layer) => layer.length),
        );
        const svgHeight = Math.max(350, maxVerticesInLayer * 80 + 60);
        const svgWidth = 700;

        const positions = calculateVertexPositions(graph, svgWidth, svgHeight);

        // Генерируем SVG
        let svgContent = `<svg viewBox="0 0 ${svgWidth} ${svgHeight}" class="graph-svg" width="${svgWidth}" height="${svgHeight}">
          <defs>
            <marker id="arrowhead" markerWidth="4" markerHeight="3" refX="3" refY="1.5" orient="auto">
              <polygon points="0 0, 4 1.5, 0 3" fill="#00e5ff" />
            </marker>
          </defs>
          <rect x="0" y="0" width="${svgWidth}" height="${svgHeight}" fill="#1a1a2e" rx="10" />`;

        // Рисуем рёбра
        for (let i = 0; i < graph.vertexCount; i++) {
          for (let j = 0; j < graph.vertexCount; j++) {
            if (graph.edges[i][j]) {
              // Пропускаем, если позиция не определена
              if (!positions[i] || !positions[j]) continue;

              const x1 = positions[i].x;
              const y1 = positions[i].y;
              const x2 = positions[j].x;
              const y2 = positions[j].y;

              // Вычисляем точку на границе круга
              const dx = x2 - x1;
              const dy = y2 - y1;
              const dist = Math.sqrt(dx * dx + dy * dy);
              const radius = 22;

              const startX = x1 + (dx / dist) * radius;
              const startY = y1 + (dy / dist) * radius;
              const endX = x2 - (dx / dist) * (radius + 6);
              const endY = y2 - (dy / dist) * (radius + 6);

              // Проверяем, нужно ли изгибать линию (если она проходит через другую вершину)
              let needsCurve = false;
              let curveOffset = 0;

              for (let k = 0; k < graph.vertexCount; k++) {
                if (k === i || k === j || !positions[k]) continue;

                const px = positions[k].x;
                const py = positions[k].y;

                // Вычисляем расстояние от точки до линии
                const lineLen = dist;
                const t = Math.max(
                  0,
                  Math.min(
                    1,
                    ((px - x1) * (x2 - x1) + (py - y1) * (y2 - y1)) /
                      (lineLen * lineLen),
                  ),
                );
                const closestX = x1 + t * (x2 - x1);
                const closestY = y1 + t * (y2 - y1);
                const distToPoint = Math.sqrt(
                  (px - closestX) ** 2 + (py - closestY) ** 2,
                );

                if (distToPoint < radius * 2) {
                  needsCurve = true;
                  curveOffset = 30;
                  break;
                }
              }

              if (needsCurve) {
                // Используем квадратичную кривую Безье для обхода
                const midX = (startX + endX) / 2;
                const midY = (startY + endY) / 2;
                // Перпендикуляр к линии
                const perpX = -(endY - startY);
                const perpY = endX - startX;
                const perpLen = Math.sqrt(perpX * perpX + perpY * perpY);
                const controlX = midX + (perpX / perpLen) * curveOffset;
                const controlY = midY + (perpY / perpLen) * curveOffset;

                svgContent += `<path d="M ${startX} ${startY} Q ${controlX} ${controlY} ${endX} ${endY}" 
                  fill="none" stroke="#00e5ff" stroke-width="2.5" marker-end="url(#arrowhead)" opacity="0.9" />`;
              } else {
                svgContent += `<line x1="${startX}" y1="${startY}" x2="${endX}" y2="${endY}" 
                  stroke="#00e5ff" stroke-width="2.5" marker-end="url(#arrowhead)" opacity="0.9" />`;
              }
            }
          }
        }

        // Рисуем вершины
        for (let i = 0; i < graph.vertexCount; i++) {
          // Пропускаем, если позиция не определена
          if (!positions[i]) continue;

          const x = positions[i].x;
          const y = positions[i].y;
          const color = VERTEX_COLORS[i % VERTEX_COLORS.length];

          svgContent += `<circle cx="${x}" cy="${y}" r="22" fill="${color}" />`;
          svgContent += `<text x="${x}" y="${y + 5}" fill="white" text-anchor="middle" font-weight="bold" font-size="16">${graph.vertices[i]}</text>`;
        }

        svgContent += "</svg>";

        taskCard.innerHTML = `
          <div class="task-header">
            <span class="task-type ${currentTask.typeClass}">${currentTask.typeLabel}</span>
          </div>
          <div class="task-text">
            <p>На рисунке — схема дорог, связывающих города ${graph.vertices.join(", ")}. По каждой дороге можно двигаться только в одном направлении, указанном стрелкой.</p>
            <p><strong>${currentTask.question}</strong></p>
          </div>
          <div class="graph-container">
            ${svgContent}
          </div>
          <div class="answer-section">
            <label class="answer-label">Ваш ответ:</label>
            <input type="number" class="answer-input" id="answerInput" placeholder="?" min="0" autocomplete="off">
            <div class="buttons">
              <button class="btn btn-check" onclick="checkAnswer()">✓ Проверить</button>
              <button class="btn btn-next" onclick="nextTask()">🔄 Новая задача</button>
              <button class="btn btn-hint" onclick="showHint()">💡 Подсказка</button>
              <button class="btn btn-solution" onclick="showSolution()">📝 Решение</button>
            </div>
            <div class="result" id="result"></div>
          </div>
        `;

        // Добавляем обработчик Enter
        document
          .getElementById("answerInput")
          .addEventListener("keypress", function (e) {
            if (e.key === "Enter") {
              checkAnswer();
            }
          });

        document.getElementById("answerInput").focus();
      }

      // Проверка ответа
      function checkAnswer() {
        const input = document.getElementById("answerInput");
        const result = document.getElementById("result");
        const userAnswer = parseInt(input.value, 10);

        if (isNaN(userAnswer)) {
          input.focus();
          return;
        }

        if (userAnswer === currentTask.answer) {
          input.classList.remove("incorrect");
          input.classList.add("correct");
          result.className = "result correct";
          result.innerHTML = "✅ Правильно! Отличная работа!";
        } else {
          input.classList.remove("correct");
          input.classList.add("incorrect");
          result.className = "result incorrect";
          result.innerHTML = `❌ Неправильно. Правильный ответ: <strong>${currentTask.answer}</strong>`;
        }
      }

      // Следующая задача
      function nextTask() {
        generateTask();
      }

      // Показать подсказку
      function showHint() {
        const hintBox = document.getElementById("hintBox");
        const hintText = document.getElementById("hintText");
        const graph = currentTask.graph;

        let hint = `<strong>Метод решения:</strong><br>`;
        hint += `1. Для начальной вершины ${graph.vertices[0]} количество путей = 1<br>`;
        hint += `2. Для каждой следующей вершины количество путей = сумма путей всех вершин, из которых есть ребро в данную<br>`;

        if (currentTask.throughVertex) {
          hint += `<br><strong>Для путей ${currentTask.typeClass === "through" ? "через" : "не через"} вершину ${currentTask.throughVertex}:</strong><br>`;
          if (currentTask.typeClass === "through") {
            hint += `N(через ${currentTask.throughVertex}) = N(${graph.vertices[0]}→${currentTask.throughVertex}) × N(${currentTask.throughVertex}→${graph.vertices[graph.vertexCount - 1]})`;
          } else {
            hint += `N(не через ${currentTask.throughVertex}) = N(всего) - N(через ${currentTask.throughVertex})`;
          }
        }

        hintText.innerHTML = hint;
        hintBox.style.display = "block";
      }

      // Показать решение
      function showSolution() {
        const solutionBox = document.getElementById("solutionBox");
        const solutionContent = document.getElementById("solutionContent");
        const graph = currentTask.graph;
        const paths = currentTask.paths;

        let solution = "";

        // Таблица подсчёта путей
        solution += `<p><strong>Подсчёт количества путей для каждой вершины:</strong></p>`;
        solution += `<table class="solution-table">
          <tr><th>Вершина</th><th>Откуда можно прийти</th><th>Количество путей</th></tr>`;

        for (let i = 0; i < graph.vertexCount; i++) {
          const predecessors = [];
          for (let j = 0; j < i; j++) {
            if (graph.edges[j][i]) {
              predecessors.push(graph.vertices[j]);
            }
          }

          const fromStr =
            i === 0 ? "— (начало)" : predecessors.join(", ") || "—";
          const isLast = i === graph.vertexCount - 1;
          const isThrough = i === currentTask.throughIndex;

          solution += `<tr>
            <td${isLast || isThrough ? ' class="highlight-cell"' : ""}>${graph.vertices[i]}${isThrough ? " (через)" : ""}</td>
            <td>${fromStr}</td>
            <td${isLast || isThrough ? ' class="highlight-cell"' : ""}>${paths[i]}</td>
          </tr>`;
        }

        solution += `</table>`;

        // Ответ на вопрос
        solution += `<div class="solution-step">`;
        if (currentTask.throughVertex) {
          if (currentTask.typeClass === "through") {
            const pathsToThrough = paths[currentTask.throughIndex];
            // Считаем пути от throughVertex до конца
            const pathsFrom = new Array(graph.vertexCount).fill(0);
            pathsFrom[currentTask.throughIndex] = 1;
            for (
              let i = currentTask.throughIndex + 1;
              i < graph.vertexCount;
              i++
            ) {
              let sum = 0;
              for (let j = currentTask.throughIndex; j < i; j++) {
                if (graph.edges[j][i]) {
                  sum += pathsFrom[j];
                }
              }
              pathsFrom[i] = sum;
            }
            const pathsFromThrough = pathsFrom[graph.vertexCount - 1];

            solution += `<strong>Пути через ${currentTask.throughVertex}:</strong><br>`;
            solution += `N(${graph.vertices[0]}→${currentTask.throughVertex}) = ${pathsToThrough}<br>`;
            solution += `N(${currentTask.throughVertex}→${graph.vertices[graph.vertexCount - 1]}) = ${pathsFromThrough}<br>`;
            solution += `N(через ${currentTask.throughVertex}) = ${pathsToThrough} × ${pathsFromThrough} = <strong>${currentTask.answer}</strong>`;
          } else {
            const pathsThrough = paths[currentTask.throughIndex];
            // Считаем пути от throughVertex до конца
            const pathsFrom = new Array(graph.vertexCount).fill(0);
            pathsFrom[currentTask.throughIndex] = 1;
            for (
              let i = currentTask.throughIndex + 1;
              i < graph.vertexCount;
              i++
            ) {
              let sum = 0;
              for (let j = currentTask.throughIndex; j < i; j++) {
                if (graph.edges[j][i]) {
                  sum += pathsFrom[j];
                }
              }
              pathsFrom[i] = sum;
            }
            const pathsFromThrough = pathsFrom[graph.vertexCount - 1];
            const throughTotal = pathsThrough * pathsFromThrough;

            solution += `<strong>Пути не через ${currentTask.throughVertex}:</strong><br>`;
            solution += `N(всего) = ${paths[graph.vertexCount - 1]}<br>`;
            solution += `N(через ${currentTask.throughVertex}) = ${pathsThrough} × ${pathsFromThrough} = ${throughTotal}<br>`;
            solution += `N(не через ${currentTask.throughVertex}) = ${paths[graph.vertexCount - 1]} - ${throughTotal} = <strong>${currentTask.answer}</strong>`;
          }
        } else {
          solution += `<strong>Ответ:</strong> ${currentTask.answer}`;
        }
        solution += `</div>`;

        solutionContent.innerHTML = solution;
        solutionBox.style.display = "block";
      }

      // Скрыть подсказки и решение
      function hideHintsAndSolution() {
        document.getElementById("hintBox").style.display = "none";
        document.getElementById("solutionBox").style.display = "none";
      }

      // Прокрутка наверх
      function scrollToTop() {
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      // Инициализация
      generateTask();
    </script>
  </body>
</html>

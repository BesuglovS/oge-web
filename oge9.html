    <script>
      // Русские буквы для вершин (без Ё, Й, Ъ, Ы, Ь)
      const VERTEX_NAMES = [
        "А",
        "Б",
        "В",
        "Г",
        "Д",
        "Е",
        "Ж",
        "З",
        "И",
        "К",
        "Л",
        "М",
        "Н",
        "П",
        "Р",
      ];

      // Цвета для вершин
      const VERTEX_COLORS = [
        "#e94560",
        "#38ef7d",
        "#667eea",
        "#f5576c",
        "#ffc107",
        "#4caf50",
        "#9c27b0",
        "#00bcd4",
        "#ff5722",
        "#607d8b",
        "#e91e63",
        "#8bc34a",
        "#03a9f4",
        "#ff9800",
        "#795548",
      ];

      let currentTask = null;

      // Генерация случайного целого числа
      function randomInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
      }

      // Генерация ориентированного графа с послойной структурой
      function generateGraph() {
        const vertexCount = randomInt(9, 12);
        const vertices = VERTEX_NAMES.slice(0, vertexCount);

        // Матрица смежности (edges[i][j] = true означает ребро из i в j)
        const edges = [];
        for (let i = 0; i < vertexCount; i++) {
          edges[i] = [];
          for (let j = 0; j < vertexCount; j++) {
            edges[i][j] = false;
          }
        }

        // Распределяем вершины по слоям (не более 5 слоёв)
        // Первый слой: только вершина 0 (А)
        // Последний слой: только последняя вершина
        // Примеры: 1-4-3-1-1, 1-4-4-1, 1-3-1-3-1
        const layers = [];
        layers.push([0]); // Первый слой - только А

        const maxLayers = 5;
        const totalLayers = randomInt(4, maxLayers); // От 4 до 5 слоёв
        const middleLayers = totalLayers - 2; // Промежуточные слои

        let remainingVertices = vertexCount - 2; // Без первой и последней
        let currentVertex = 1;

        // Создаём промежуточные слои
        for (let l = 0; l < middleLayers && remainingVertices > 0; l++) {
          // Распределяем вершины равномерно по слоям
          const layersLeft = middleLayers - l;
          const layerSize = Math.ceil(remainingVertices / layersLeft);

          const layer = [];
          for (
            let i = 0;
            i < layerSize && currentVertex < vertexCount - 1;
            i++
          ) {
            layer.push(currentVertex);
            currentVertex++;
            remainingVertices--;
          }
          if (layer.length > 0) {
            layers.push(layer);
          }
        }

        layers.push([vertexCount - 1]); // Последний слой

        // Функция для подсчёта входящих рёбер в вершину
        function countIncomingEdges(vertexIndex) {
          let count = 0;
          for (let i = 0; i < vertexIndex; i++) {
            if (edges[i][vertexIndex]) count++;
          }
          return count;
        }

        // Генерируем рёбра между соседними слоями
        for (let l = 0; l < layers.length - 1; l++) {
          const currentLayer = layers[l];
          const nextLayer = layers[l + 1];

          // Каждая вершина в текущем слое должна иметь хотя бы одно исходящее ребро
          for (const source of currentLayer) {
            // Выбираем цель, у которой меньше 4 входящих рёбер
            let target = nextLayer[randomInt(0, nextLayer.length - 1)];
            let attempts = 0;
            while (
              countIncomingEdges(target) >= 4 &&
              attempts < nextLayer.length
            ) {
              target = nextLayer[randomInt(0, nextLayer.length - 1)];
              attempts++;
            }
            if (countIncomingEdges(target) < 4) {
              edges[source][target] = true;
            }
          }

          // Каждая вершина в следующем слое должна иметь хотя бы одно входящее ребро
          for (const target of nextLayer) {
            // Пропускаем, если уже есть входящее ребро или уже 4 ребра
            if (countIncomingEdges(target) >= 4) continue;

            let hasIncoming = false;
            for (const source of currentLayer) {
              if (edges[source][target]) {
                hasIncoming = true;
                break;
              }
            }
            // Если нет прямого ребра, добавляем связь
            if (!hasIncoming) {
              // Сначала пробуем связь от верхней вершины в этом же слое
              const targetIndex = nextLayer.indexOf(target);
              let added = false;

              if (targetIndex > 0 && countIncomingEdges(target) < 4) {
                edges[nextLayer[targetIndex - 1]][target] = true;
                added = true;
              }

              // Если не получилось, добавляем связь из предыдущего слоя
              if (!added) {
                const source =
                  currentLayer[randomInt(0, currentLayer.length - 1)];
                if (countIncomingEdges(target) < 4) {
                  edges[source][target] = true;
                }
              }
            }
          }
        }

        // Иногда добавляем рёбра через слой насквозь (не более 4 входящих в каждую вершину)
        for (let l = 0; l < layers.length - 2; l++) {
          const currentLayer = layers[l];
          const skipLayer = layers[l + 2];
          for (const source of currentLayer) {
            for (const target of skipLayer) {
              if (Math.random() < 0.15 && countIncomingEdges(target) < 4) {
                edges[source][target] = true;
              }
            }
          }
        }

        // Связи между вершинами в одном слое НЕ добавляем
        // так как на маленьком расстоянии стрелки не видны

        return { vertices, edges, vertexCount, layers };
      }

      // Подсчёт количества путей из каждой вершины в конечную
      function calculatePaths(vertices, edges) {
        const n = vertices.length;
        const paths = new Array(n).fill(0);

        // Начальная вершина
        paths[0] = 1;

        // Для каждой вершины считаем количество путей
        for (let i = 1; i < n; i++) {
          let sum = 0;
          for (let j = 0; j < i; j++) {
            if (edges[j][i]) {
              sum += paths[j];
            }
          }
          paths[i] = sum;
        }

        return paths;
      }

      // Подсчёт путей через определённую вершину
      function calculatePathsThrough(vertices, edges, throughIndex, pathsTo) {
        const n = vertices.length;

        // Количество путей от начальной вершины до throughIndex
        const pathsToVertex = pathsTo[throughIndex];

        // Считаем пути от throughIndex до конечной
        const pathsFrom = new Array(n).fill(0);
        pathsFrom[throughIndex] = 1;

        for (let i = throughIndex + 1; i < n; i++) {
          let sum = 0;
          for (let j = throughIndex; j < i; j++) {
            if (edges[j][i]) {
              sum += pathsFrom[j];
            }
          }
          pathsFrom[i] = sum;
        }

        return pathsToVertex * pathsFrom[n - 1];
      }

      // Проверка, что все вершины распределены по слоям
      function validateGraph(graph) {
        const allVertices = new Set();
        for (const layer of graph.layers) {
          for (const v of layer) {
            allVertices.add(v);
          }
        }
        return allVertices.size === graph.vertexCount;
      }

      // Генерация задачи
      function generateTask() {
        let graph, paths;
        // Генерируем граф, пока общее количество путей не будет >= 8 и все вершины распределены
        do {
          graph = generateGraph();
          paths = calculatePaths(graph.vertices, graph.edges);
        } while (paths[graph.vertexCount - 1] < 8 || !validateGraph(graph));

        // Выбираем тип задачи
        const taskType = randomInt(0, 2);

        let question = "";
        let answer = 0;
        let typeClass = "";
        let typeLabel = "";
        let throughVertex = null;
        let throughIndex = -1;

        if (taskType === 0) {
          // Общее количество путей
          question = `Сколько существует различных путей из города ${graph.vertices[0]} в город ${graph.vertices[graph.vertexCount - 1]}?`;
          answer = paths[graph.vertexCount - 1];
          typeClass = "";
          typeLabel = "Общее количество путей";
        } else if (taskType === 1) {
          // Пути через вершину (выбираем вершину не первую и не последнюю)
          throughIndex = randomInt(1, graph.vertexCount - 2);
          throughVertex = graph.vertices[throughIndex];
          answer = calculatePathsThrough(
            graph.vertices,
            graph.edges,
            throughIndex,
            paths,
          );
          question = `Сколько существует различных путей из города ${graph.vertices[0]} в город ${graph.vertices[graph.vertexCount - 1]}, которые проходят через город ${throughVertex}?`;
          typeClass = "through";
          typeLabel = "Пути через вершину";
        } else {
          // Пути не через вершину
          throughIndex = randomInt(1, graph.vertexCount - 2);
          throughVertex = graph.vertices[throughIndex];
          const pathsThrough = calculatePathsThrough(
            graph.vertices,
            graph.edges,
            throughIndex,
            paths,
          );
          answer = paths[graph.vertexCount - 1] - pathsThrough;
          question = `Сколько существует различных путей из города ${graph.vertices[0]} в город ${graph.vertices[graph.vertexCount - 1]}, которые НЕ проходят через город ${throughVertex}?`;
          typeClass = "not-through";
          typeLabel = "Пути не через вершину";
        }

        currentTask = {
          graph: graph,
          paths: paths,
          question: question,
          answer: answer,
          typeClass: typeClass,
          typeLabel: typeLabel,
          throughVertex: throughVertex,
          throughIndex: throughIndex,
        };

        renderTask();
        hideHintsAndSolution();
      }

      // Вычисление координат вершин для отрисовки по слоям
      function calculateVertexPositions(graph, width, height) {
        const positions = [];
        const marginX = 70;
        const marginY = 50;
        const usableWidth = width - 2 * marginX;
        const usableHeight = height - 2 * marginY;

        const layers = graph.layers;
        const layerCount = layers.length;

        // Создаём массив позиций, индекс соответствует индексу вершины
        for (let l = 0; l < layerCount; l++) {
          const layer = layers[l];
          const countInLayer = layer.length;
          const x = marginX + (l / (layerCount - 1 || 1)) * usableWidth;

          for (let i = 0; i < countInLayer; i++) {
            const vertexIndex = layer[i];
            // Минимальное расстояние между вершинами в слое - 70 пикселей
            const minSpacing = 70;
            const naturalSpacing = usableHeight / (countInLayer + 1);
            const spacing = Math.max(minSpacing, naturalSpacing);
            // Центрируем вершины по вертикали
            const totalHeight = (countInLayer - 1) * spacing;
            const startY = (height - totalHeight) / 2;
            const y = startY + i * spacing;
            positions[vertexIndex] = { x: Math.round(x), y: Math.round(y) };
          }
        }

        return positions;
      }

      // Проверка пересечения отрезка с окружностью
      function lineIntersectsCircle(x1, y1, x2, y2, cx, cy, r) {
        // Вектор от x1,y1 к x2,y2
        const dx = x2 - x1;
        const dy = y2 - y1;
        // Вектор от x1,y1 к центру окружности
        const fx = x1 - cx;
        const fy = y1 - cy;

        const a = dx * dx + dy * dy;
        const b = 2 * (fx * dx + fy * dy);
        const c = fx * fx + fy * fy - r * r;

        let discriminant = b * b - 4 * a * c;
        if (discriminant < 0) return false;

        discriminant = Math.sqrt(discriminant);
        const t1 = (-b - discriminant) / (2 * a);
        const t2 = (-b + discriminant) / (2 * a);

        // Проверяем, есть ли пересечение в пределах отрезка (с небольшим отступом от концов)
        const eps = 0.15;
        return (
          (t1 > eps && t1 < 1 - eps) ||
          (t2 > eps && t2 < 1 - eps) ||
          (t1 < 0 && t2 > 1)
        );
      }

      // Проверка пересечения двух кривых Безье (приближённо)
      function curvesIntersect(x1, y1, cx1, cy1, x2, y2, cx2, cy2, threshold) {
        // Разбиваем кривые на точки и проверяем расстояние
        const steps = 10;
        for (let i = 0; i <= steps; i++) {
          const t = i / steps;
          // Точка на первой кривой
          const px1 =
            (1 - t) * (1 - t) * x1 + 2 * (1 - t) * t * cx1 + t * t * x2;
          const py1 =
            (1 - t) * (1 - t) * y1 + 2 * (1 - t) * t * cy1 + t * t * y2;

          for (let j = 0; j <= steps; j++) {
            const s = j / steps;
            // Точка на второй кривой
            const px2 =
              (1 - s) * (1 - s) * x1 + 2 * (1 - s) * s * cx2 + s * s * x2;
            const py2 =
              (1 - s) * (1 - s) * y1 + 2 * (1 - s) * s * cy2 + s * s * y2;

            const dist = Math.sqrt((px1 - px2) ** 2 + (py1 - py2) ** 2);
            if (dist < threshold) return true;
          }
        }
        return false;
      }

      // Отрисовка задачи
      function renderTask() {
        const taskCard = document.getElementById("taskCard");
        const graph = currentTask.graph;

        // Вычисляем высоту SVG в зависимости от максимального количества вершин в слое
        const maxVerticesInLayer = Math.max(
          ...graph.layers.map((layer) => layer.length),
        );
        const svgHeight = Math.max(350, maxVerticesInLayer * 80 + 60);
        const svgWidth = 780; // Увеличена ширина для полей ввода

        const positions = calculateVertexPositions(graph, svgWidth, svgHeight);

        // Собираем все рёбра и их параметры для предотвращения наложений
        const edgeData = [];
        for (let i = 0; i < graph.vertexCount; i++) {
          for (let j = 0; j < graph.vertexCount; j++) {
            if (graph.edges[i][j] && positions[i] && positions[j]) {
              edgeData.push({ from: i, to: j });
            }
          }
        }

        // Группируем рёбра по парам вершин (для определения параллельных рёбер)
        const edgeGroups = {};
        for (const edge of edgeData) {
          const key = `${Math.min(edge.from, edge.to)}-${Math.max(edge.from, edge.to)}`;
          if (!edgeGroups[key]) edgeGroups[key] = [];
          edgeGroups[key].push(edge);
        }

        // Вычисляем параметры кривых для каждого ребра
        const curveParams = {};
        const usedOffsets = {}; // Для отслеживания используемых смещений

        for (const edge of edgeData) {
          const x1 = positions[edge.from].x;
          const y1 = positions[edge.from].y;
          const x2 = positions[edge.to].x;
          const y2 = positions[edge.to].y;

          // Проверяем, проходит ли ребро через какую-либо вершину
          let needsCurve = false;
          let curveDirection = 1; // 1 или -1
          let baseOffset = 0;

          const radius = 22;
          const safetyRadius = radius + 15; // Увеличиваем радиус безопасности

          for (let k = 0; k < graph.vertexCount; k++) {
            if (k === edge.from || k === edge.to || !positions[k]) continue;

            const px = positions[k].x;
            const py = positions[k].y;

            if (lineIntersectsCircle(x1, y1, x2, y2, px, py, safetyRadius)) {
              needsCurve = true;
              // Определяем направление изгиба по положению вершины относительно линии
              const crossProduct =
                (x2 - x1) * (py - y1) - (y2 - y1) * (px - x1);
              curveDirection = crossProduct > 0 ? -1 : 1;
              baseOffset = 35;
              break;
            }
          }

          // Проверяем наложение с другими рёбрами между теми же слоями
          const edgeKey = `${edge.from}-${edge.to}`;
          const reverseKey = `${edge.to}-${edge.from}`;

          // Увеличиваем смещение для каждого последующего параллельного ребра
          const parallelKey = `${Math.min(edge.from, edge.to)}-${Math.max(edge.from, edge.to)}`;
          if (edgeGroups[parallelKey] && edgeGroups[parallelKey].length > 1) {
            needsCurve = true;
            const idx = edgeGroups[parallelKey].indexOf(edge);
            if (idx > 0) {
              baseOffset = Math.max(baseOffset, 25 + idx * 20);
              // Чередуем направление для параллельных рёбер
              curveDirection = idx % 2 === 0 ? 1 : -1;
            }
          }

          curveParams[edgeKey] = {
            needsCurve,
            curveDirection,
            baseOffset,
          };
        }

        // Генерируем SVG
        let svgContent = `<svg viewBox="0 0 ${svgWidth} ${svgHeight}" class="graph-svg" width="${svgWidth}" height="${svgHeight}">
          <defs>
            <marker id="arrowhead" markerWidth="4" markerHeight="3" refX="3" refY="1.5" orient="auto">
              <polygon points="0 0, 4 1.5, 0 3" fill="#00e5ff" />
            </marker>
          </defs>
          <rect x="0" y="0" width="${svgWidth}" height="${svgHeight}" fill="#1a1a2e" rx="10" />`;

        // Рисуем рёбра
        for (const edge of edgeData) {
          const i = edge.from;
          const j = edge.to;

          const x1 = positions[i].x;
          const y1 = positions[i].y;
          const x2 = positions[j].x;
          const y2 = positions[j].y;

          // Вычисляем точку на границе круга
          const dx = x2 - x1;
          const dy = y2 - y1;
          const dist = Math.sqrt(dx * dx + dy * dy);
          const radius = 22;

          const startX = x1 + (dx / dist) * radius;
          const startY = y1 + (dy / dist) * radius;
          const endX = x2 - (dx / dist) * (radius + 6);
          const endY = y2 - (dy / dist) * (radius + 6);

          const edgeKey = `${i}-${j}`;
          const params = curveParams[edgeKey];

          if (params.needsCurve) {
            // Используем квадратичную кривую Безье для обхода
            const midX = (startX + endX) / 2;
            const midY = (startY + endY) / 2;
            // Перпендикуляр к линии
            const perpX = -(endY - startY);
            const perpY = endX - startX;
            const perpLen = Math.sqrt(perpX * perpX + perpY * perpY);
            const curveOffset = params.baseOffset * params.curveDirection;
            const controlX = midX + (perpX / perpLen) * curveOffset;
            const controlY = midY + (perpY / perpLen) * curveOffset;

            svgContent += `<path d="M ${startX} ${startY} Q ${controlX} ${controlY} ${endX} ${endY}" 
              fill="none" stroke="#00e5ff" stroke-width="2.5" marker-end="url(#arrowhead)" opacity="0.9" />`;
          } else {
            svgContent += `<line x1="${startX}" y1="${startY}" x2="${endX}" y2="${endY}" 
              stroke="#00e5ff" stroke-width="2.5" marker-end="url(#arrowhead)" opacity="0.9" />`;
          }
        }

        // Рисуем вершины и поля ввода
        for (let i = 0; i < graph.vertexCount; i++) {
          // Пропускаем, если позиция не определена
          if (!positions[i]) continue;

          const x = positions[i].x;
          const y = positions[i].y;
          const color = VERTEX_COLORS[i % VERTEX_COLORS.length];

          svgContent += `<circle cx="${x}" cy="${y}" r="22" fill="${color}" style="cursor: pointer;" onclick="incrementVertexValue(${i})" />`;
          svgContent += `<text x="${x}" y="${y + 5}" fill="white" text-anchor="middle" font-weight="bold" font-size="16" style="pointer-events: none;">${graph.vertices[i]}</text>`;

          // Добавляем поле ввода справа от вершины
          const inputX = x + 30;
          const inputY = y - 14;
          svgContent += `<foreignObject x="${inputX}" y="${inputY}" width="42" height="32">
            <input type="text" class="vertex-input" id="vertex-${i}" data-vertex="${i}" placeholder="?" xmlns="http://www.w3.org/1999/xhtml" />
          </foreignObject>`;
        }

        svgContent += "</svg>";

        taskCard.innerHTML = `
          <div class="task-header">
            <span class="task-type ${currentTask.typeClass}">${currentTask.typeLabel}</span>
          </div>
          <div class="task-text">
            <p>На рисунке — схема дорог, связывающих города ${graph.vertices.join(", ")}. По каждой дороге можно двигаться только в одном направлении, указанном стрелкой.</p>
            <p><strong>${currentTask.question}</strong></p>
          </div>
          <div class="graph-container">
            ${svgContent}
          </div>
          <div class="answer-section">
            <label class="answer-label">Ваш ответ:</label>
            <input type="number" class="answer-input" id="answerInput" placeholder="?" min="0" autocomplete="off">
            <div class="buttons">
              <button class="btn btn-check" onclick="checkAnswer()">✓ Проверить</button>
              <button class="btn btn-next" onclick="nextTask()">🔄 Новая задача</button>
              <button class="btn btn-hint" onclick="showHint()">💡 Подсказка</button>
              <button class="btn btn-solution" onclick="showSolution()">📝 Решение</button>
            </div>
            <div class="result" id="result"></div>
          </div>
          <div class="vertex-controls" style="margin-top: 15px; padding-top: 15px; border-top: 1px dashed #ddd;">
            <label class="answer-label">Проверка значений вершин:</label>
            <div class="buttons">
              <button class="btn btn-check-values" onclick="checkVertexValues()">🔍 Проверить значения</button>
              <button class="btn btn-show-values" onclick="showVertexValues()">👁 Показать ответ</button>
              <button class="btn btn-clear-values" onclick="clearVertexValues()">🗑 Очистить</button>
            </div>
          </div>
        `;

        // Добавляем обработчик Enter
        document
          .getElementById("answerInput")
          .addEventListener("keypress", function (e) {
            if (e.key === "Enter") {
              checkAnswer();
            }
          });

        document.getElementById("answerInput").focus();
      }

      // Проверка ответа
      function checkAnswer() {
        const input = document.getElementById("answerInput");
        const result = document.getElementById("result");
        const userAnswer = parseInt(input.value, 10);

        if (isNaN(userAnswer)) {
          input.focus();
          return;
        }

        if (userAnswer === currentTask.answer) {
          input.classList.remove("incorrect");
          input.classList.add("correct");
          result.className = "result correct";
          result.innerHTML = "✅ Правильно! Отличная работа!";
        } else {
          input.classList.remove("correct");
          input.classList.add("incorrect");
          result.className = "result incorrect";
          result.innerHTML = `❌ Неправильно. Правильный ответ: <strong>${currentTask.answer}</strong>`;
        }
      }

            hint += `2. Считаем пути от ${currentTask.throughVertex} до ${graph.vertices[graph.vertexCount - 1]}<br>`;

            hint += `<em>В полях ввода: для вершин до ${currentTask.throughVertex} — пути от А, для вершин после — пути от ${currentTask.throughVertex}.</em>`;
          } else {

          const pathsToThrough = pathsThrough[currentTask.throughIndex];

          solution += `N(${currentTask.throughVertex}→${graph.vertices[graph.vertexCount - 1]}) = ${pathsFromThrough}<br>`;
          solution += `N(через ${currentTask.throughVertex}) = ${pathsToThrough} × ${pathsFromThrough} = <strong>${currentTask.answer}</strong>`;
          solution += `</div>`;
        } else {
          // Обычная таблица подсчёта путей
          solution += `<p><strong>Подсчёт количества путей для каждой вершины:</strong></p>`;
          solution += `<table class="solution-table">

      // Скрыть подсказки и решение
      function hideHintsAndSolution() {
        document.getElementById("hintBox").style.display = "none";
        document.getElementById("solutionBox").style.display = "none";
      }

      // Прокрутка наверх
      function scrollToTop() {
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      // Расчёт путей с учётом запрета вершины (для задач "не через вершину")
      function calculatePathsWithoutVertex(graph, throughIndex) {
        const n = graph.vertexCount;
        const paths = new Array(n).fill(0);

        // Начальная вершина
        paths[0] = 1;

        // Для каждой вершины считаем количество путей
        for (let i = 1; i < n; i++) {
          // Если это запретная вершина, количество путей = 0
          if (i === throughIndex) {
            paths[i] = 0;
            continue;
          }

          let sum = 0;
          for (let j = 0; j < i; j++) {
            if (graph.edges[j][i]) {
              sum += paths[j];
            }
          }
          paths[i] = sum;
        }

        return paths;
      }

      // Расчёт путей для задач "через вершину"
      // Вершина находится в пути через X, если она лежит на пути от А до конечной через X
      // Это включает:
      // 1. Вершины до X, из которых можно попасть в X
      // 2. Саму вершину X
      // 3. Вершины после X, в которые можно попасть из X
      // Все остальные вершины имеют значение 0
      function calculatePathsThroughVertex(graph, throughIndex) {
        const n = graph.vertexCount;
        const paths = new Array(n).fill(0);

        // Находим все вершины, из которых можно попасть в X (включая X)
        const canReachX = new Set();
        canReachX.add(throughIndex);
        // Идём от X назад к А
        for (let i = throughIndex - 1; i >= 0; i--) {
          for (let j = i + 1; j <= throughIndex; j++) {
            if (graph.edges[i][j] && canReachX.has(j)) {
              canReachX.add(i);
              break;
            }
          }
        }

        // Находим все вершины, в которые можно попасть из X (включая X)
        const reachableFromX = new Set();
        reachableFromX.add(throughIndex);
        // Идём от X вперёд к конечной
        for (let i = throughIndex + 1; i < n; i++) {
          for (let j = throughIndex; j < i; j++) {
            if (graph.edges[j][i] && reachableFromX.has(j)) {
              reachableFromX.add(i);
              break;
            }
          }
        }

        // Вершина в пути через X, если она в canReachX И в reachableFromX
        // Но это невозможно для вершин до X и после X одновременно
        // На самом деле: вершина в пути через X, если:
        // - она в canReachX (для вершин до X и сама X)
        // - она в reachableFromX (для вершин после X и сама X)
        const inPathThroughX = new Set();
        for (let i = 0; i < n; i++) {
          if (i <= throughIndex && canReachX.has(i)) {
            inPathThroughX.add(i);
          } else if (i >= throughIndex && reachableFromX.has(i)) {
            inPathThroughX.add(i);
          }
        }

        // Считаем пути от А до X (только для вершин в пути)
        paths[0] = 1;
        for (let i = 1; i <= throughIndex; i++) {
          if (!inPathThroughX.has(i)) continue;
          let sum = 0;
          for (let j = 0; j < i; j++) {
            if (graph.edges[j][i] && inPathThroughX.has(j)) {
              sum += paths[j];
            }
          }
          paths[i] = sum;
        }

        // Считаем пути от X до конечной (только для вершин в пути)
        for (let i = throughIndex + 1; i < n; i++) {
          if (!inPathThroughX.has(i)) continue;
          let sum = 0;
          for (let j = throughIndex; j < i; j++) {
            if (graph.edges[j][i] && inPathThroughX.has(j)) {
              sum += paths[j];
            }
          }
          paths[i] = sum;
        }

        return paths;
      }

      // Получить правильные значения для вершин в зависимости от типа задачи
      function getCorrectVertexValues() {
        const graph = currentTask.graph;
        const paths = currentTask.paths;

        // Для задач "не через вершину" показываем пути с учётом запрета
        if (
          currentTask.typeClass === "not-through" &&
          currentTask.throughIndex !== -1
        ) {
          return calculatePathsWithoutVertex(graph, currentTask.throughIndex);
        }

        // Для задач "через вершину" показываем пути до и после вершины
        if (
          currentTask.typeClass === "through" &&
          currentTask.throughIndex !== -1
        ) {
          return calculatePathsThroughVertex(graph, currentTask.throughIndex);
        }

        // Для остальных задач показываем обычные пути
        return paths;
      }

      // Проверка значений вершин
      function checkVertexValues() {
        const graph = currentTask.graph;
        // Получаем правильные значения с учётом типа задачи
        const correctPaths = getCorrectVertexValues();
        let allCorrect = true;
        let correctCount = 0;
        let totalFilled = 0;

        for (let i = 0; i < graph.vertexCount; i++) {
          const input = document.getElementById(`vertex-${i}`);
          if (!input) continue;

          const userValue = input.value.trim();
          if (userValue === "") continue;

          totalFilled++;
          const userNum = parseInt(userValue, 10);

          if (userNum === correctPaths[i]) {
            input.classList.remove("incorrect");
            input.classList.add("correct");
            correctCount++;
          } else {
            input.classList.remove("correct");
            input.classList.add("incorrect");
            allCorrect = false;
          }
        }

        if (totalFilled === 0) {
          alert("Заполните хотя бы одно поле для проверки.");
        } else if (allCorrect && totalFilled === graph.vertexCount) {
          alert(`✅ Отлично! Все ${correctCount} значений верны!`);
        } else if (correctCount > 0) {
          alert(
            `Правильных значений: ${correctCount} из ${totalFilled} заполненных.`,
          );
        } else {
          alert(`Все заполненные значения неверны. Попробуйте ещё раз.`);
        }
      }

      // Показать правильные значения вершин
      function showVertexValues() {
        const graph = currentTask.graph;
        // Получаем правильные значения с учётом типа задачи
        const correctPaths = getCorrectVertexValues();

        for (let i = 0; i < graph.vertexCount; i++) {
          const input = document.getElementById(`vertex-${i}`);
          if (!input) continue;

          input.value = correctPaths[i];
          input.classList.remove("incorrect");
          input.classList.add("correct");
        }
      }

      // Очистить значения вершин
      function clearVertexValues() {
        const graph = currentTask.graph;

        for (let i = 0; i < graph.vertexCount; i++) {
          const input = document.getElementById(`vertex-${i}`);
          if (!input) continue;

          input.value = "";
          input.classList.remove("correct");
          input.classList.remove("incorrect");
        }
      }

      // Увеличить значение в поле ввода вершины на 1
      function incrementVertexValue(vertexIndex) {
        const input = document.getElementById(`vertex-${vertexIndex}`);
        if (!input) return;

        const currentValue = input.value.trim();
        let newValue = 1;

        if (currentValue !== "") {
          const currentNum = parseInt(currentValue, 10);
          if (!isNaN(currentNum)) {
            newValue = currentNum + 1;
          }
        }

        input.value = newValue;
        // Убираем подсветку при изменении
        input.classList.remove("correct");
        input.classList.remove("incorrect");
      }

      // Инициализация
      generateTask();
    </script>

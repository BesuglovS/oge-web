    <script>
      // Генераторы графов
      const graphTemplates = [
        // Граф с 5 вершинами, простой

          generate: () => {

            });

            });
            edges.push({

            });
            edges.push({
              from: "C",

            });
            edges.push({

            });
            return edges;
          },
        },
        // Граф с 5 вершинами, более сложный
        {
          vertexCount: 5,
          vertices: ["A", "B", "C", "D", "E"],
          generate: () => {
            const edges = [];
            // Более связный граф
            edges.push({
              from: "A",
              to: "B",
              weight: Math.floor(Math.random() * 3) + 1,
            });
            edges.push({
              from: "A",
              to: "C",
              weight: Math.floor(Math.random() * 4) + 2,
            });
            edges.push({
              from: "B",
              to: "C",
              weight: Math.floor(Math.random() * 3) + 1,
            });
            edges.push({
              from: "B",
              to: "D",
              weight: Math.floor(Math.random() * 5) + 3,
            });
            edges.push({
              from: "B",
              to: "E",
              weight: Math.floor(Math.random() * 6) + 5,
            });
            edges.push({
              from: "C",
              to: "D",
              weight: Math.floor(Math.random() * 3) + 1,
            });
            edges.push({

              to: "E",
              weight: Math.floor(Math.random() * 4) + 2,
            });
            edges.push({
              from: "D",
              to: "E",
              weight: Math.floor(Math.random() * 3) + 1,
            });
            return edges;
          },
        },
        // Граф с 6 вершинами
        {
          vertexCount: 6,
          vertices: ["A", "B", "C", "D", "E", "F"],
          generate: () => {
            const edges = [];
            edges.push({
              from: "A",
              to: "B",
              weight: Math.floor(Math.random() * 4) + 1,
            });
            edges.push({
              from: "A",
              to: "C",
              weight: Math.floor(Math.random() * 5) + 3,
            });
            edges.push({
              from: "B",
              to: "C",
              weight: Math.floor(Math.random() * 3) + 1,
            });
            edges.push({
              from: "B",
              to: "D",
              weight: Math.floor(Math.random() * 4) + 2,
            });
            edges.push({
              from: "B",
              to: "E",
              weight: Math.floor(Math.random() * 5) + 3,
            });
            edges.push({
              from: "C",
              to: "D",
              weight: Math.floor(Math.random() * 3) + 1,
            });
            edges.push({
              from: "C",
              to: "E",
              weight: Math.floor(Math.random() * 4) + 2,
            });
            edges.push({
              from: "D",
              to: "E",
              weight: Math.floor(Math.random() * 3) + 1,
            });
            edges.push({
              from: "D",
              to: "F",
              weight: Math.floor(Math.random() * 4) + 2,
            });
            edges.push({
              from: "E",
              to: "F",
              weight: Math.floor(Math.random() * 3) + 1,
            });
            return edges;
          },
        },
        // Граф с 6 вершинами, альтернативная структура
        {
          vertexCount: 6,
          vertices: ["A", "B", "C", "D", "E", "F"],
          generate: () => {
            const edges = [];
            edges.push({
              from: "A",
              to: "B",
              weight: Math.floor(Math.random() * 3) + 2,
            });
            edges.push({
              from: "A",
              to: "D",
              weight: Math.floor(Math.random() * 5) + 4,
            });
            edges.push({
              from: "B",
              to: "C",
              weight: Math.floor(Math.random() * 3) + 1,
            });
            edges.push({
              from: "B",
              to: "E",
              weight: Math.floor(Math.random() * 4) + 3,
            });
            edges.push({
              from: "C",
              to: "D",
              weight: Math.floor(Math.random() * 3) + 1,
            });
            edges.push({
              from: "C",
              to: "E",
              weight: Math.floor(Math.random() * 4) + 2,
            });
            edges.push({
              from: "C",
              to: "F",
              weight: Math.floor(Math.random() * 5) + 3,
            });
            edges.push({
              from: "D",
              to: "F",
              weight: Math.floor(Math.random() * 3) + 1,
            });
            edges.push({
              from: "E",
              to: "F",
              weight: Math.floor(Math.random() * 3) + 2,
            });
            return edges;
          },
        },
      ];

      let currentTask = null;

      // Создание матрицы смежности из списка рёбер
      function createMatrix(edges, vertices) {
        const n = vertices.length;
        const matrix = Array(n)
          .fill(null)
          .map(() => Array(n).fill(null));

        for (const edge of edges) {
          const i = vertices.indexOf(edge.from);
          const j = vertices.indexOf(edge.to);
          matrix[i][j] = edge.weight;
          matrix[j][i] = edge.weight;
        }

        return matrix;
      }

      // Поиск кратчайшего пути (алгоритм Дейкстры)
      function findShortestPath(matrix, vertices, start, end) {
        const n = vertices.length;
        const distances = Array(n).fill(Infinity);
        const visited = Array(n).fill(false);
        const previous = Array(n).fill(-1);

        const startIdx = vertices.indexOf(start);
        const endIdx = vertices.indexOf(end);

        distances[startIdx] = 0;

        for (let count = 0; count < n; count++) {
          let minDist = Infinity;
          let u = -1;

          for (let i = 0; i < n; i++) {
            if (!visited[i] && distances[i] < minDist) {
              minDist = distances[i];
              u = i;
            }
          }

          if (u === -1 || u === endIdx) break;
          visited[u] = true;

          for (let v = 0; v < n; v++) {
            if (matrix[u][v] !== null && !visited[v]) {
              const newDist = distances[u] + matrix[u][v];
              if (newDist < distances[v]) {
                distances[v] = newDist;
                previous[v] = u;
              }
            }
          }
        }

        // Восстановление пути
        const path = [];
        let current = endIdx;
        while (current !== -1) {
          path.unshift(vertices[current]);
          current = previous[current];
        }

        return {
          distance: distances[endIdx],
          path: path,
        };
      }

      // Найти все пути (для отображения в решении)
      function findAllPaths(matrix, vertices, start, end, maxPaths = 10) {
        const paths = [];
        const startIdx = vertices.indexOf(start);
        const endIdx = vertices.indexOf(end);

        function dfs(current, visited, path, distance) {
          if (current === endIdx) {
            paths.push({
              path: [...path],
              distance: distance,
            });
            return;
          }

          if (paths.length >= maxPaths) return;

          for (let next = 0; next < vertices.length; next++) {
            if (matrix[current][next] !== null && !visited[next]) {
              visited[next] = true;
              path.push(vertices[next]);
              dfs(next, visited, path, distance + matrix[current][next]);
              path.pop();
              visited[next] = false;
            }
          }
        }

        const visited = Array(vertices.length).fill(false);
        visited[startIdx] = true;
        dfs(startIdx, visited, [start], 0);

        return paths.sort((a, b) => a.distance - b.distance);
      }

      // Генерация задачи
      function generateTask() {
        const template =
          graphTemplates[Math.floor(Math.random() * graphTemplates.length)];
        const edges = template.generate();
        const vertices = template.vertices;
        const matrix = createMatrix(edges, vertices);

        // Выбираем начальный и конечный пункты
        const startVertex = vertices[0]; // A
        const endVertex = vertices[vertices.length - 1]; // E или F

        // Определяем тип задачи
        const hasViaPoint = Math.random() > 0.5;
        let viaVertex = null;

        if (hasViaPoint && vertices.length > 4) {
          // Выбираем промежуточный пункт (не начальный и не конечный)
          const viaOptions = vertices.slice(1, -1);
          viaVertex = viaOptions[Math.floor(Math.random() * viaOptions.length)];
        }

        // Вычисляем ответ
        let answer, solutionPaths;

        if (viaVertex) {
          // Путь через промежуточный пункт
          const path1 = findShortestPath(
            matrix,
            vertices,
            startVertex,
            viaVertex,
          );
          const path2 = findShortestPath(
            matrix,
            vertices,
            viaVertex,
            endVertex,
          );
          answer = path1.distance + path2.distance;

          // Для решения находим пути
          const pathsToVia = findAllPaths(
            matrix,
            vertices,
            startVertex,
            viaVertex,
            5,
          );
          const pathsFromVia = findAllPaths(
            matrix,
            vertices,
            viaVertex,
            endVertex,
            5,
          );
          solutionPaths = { pathsToVia, pathsFromVia, viaVertex };
        } else {
          // Прямой путь
          const result = findShortestPath(
            matrix,
            vertices,
            startVertex,
            endVertex,
          );
          answer = result.distance;
          solutionPaths = {
            allPaths: findAllPaths(matrix, vertices, startVertex, endVertex, 8),
          };
        }

        currentTask = {
          matrix: matrix,
          vertices: vertices,
          edges: edges,
          startVertex: startVertex,
          endVertex: endVertex,
          viaVertex: viaVertex,
          answer: answer,
          solutionPaths: solutionPaths,
        };

        renderTask();
        hideHintsAndSolution();
      }

      function renderTask() {
        const taskCard = document.getElementById("taskCard");
        const typeLabel = currentTask.viaVertex
          ? `Путь через ${currentTask.viaVertex}`
          : "Кратчайший путь";
        const typeClass = currentTask.viaVertex ? "via-point" : "";

        // Формируем текст задачи
        let taskText = "";
        if (currentTask.viaVertex) {
          taskText = `
            <p>Между населёнными пунктами ${currentTask.vertices.join(", ")} построены дороги, протяжённость которых (в километрах) приведена в таблице.</p>
            <p>Определите длину кратчайшего пути между пунктами <span class="highlight">${currentTask.startVertex}</span> и <span class="highlight">${currentTask.endVertex}</span>, проходящего через пункт <span class="highlight">${currentTask.viaVertex}</span>.</p>
            <p>Передвигаться можно только по дорогам, протяжённость которых указана в таблице.</p>
          `;
        } else {
          taskText = `
            <p>Между населёнными пунктами ${currentTask.vertices.join(", ")} построены дороги, протяжённость которых (в километрах) приведена в таблице.</p>
            <p>Определите длину кратчайшего пути между пунктами <span class="highlight">${currentTask.startVertex}</span> и <span class="highlight">${currentTask.endVertex}</span>.</p>
            <p>Передвигаться можно только по дорогам, протяжённость которых указана в таблице.</p>
          `;
        }

        // Генерируем таблицу
        const matrixHTML = generateMatrixHTML(
          currentTask.matrix,
          currentTask.vertices,
        );

        taskCard.innerHTML = `
          <div class="task-header">
            <span class="task-type ${typeClass}">${typeLabel}</span>
          </div>
          <div class="task-text">${taskText}</div>
          <div class="matrix-container">
            ${matrixHTML}
          </div>
          <div class="answer-section">
            <label class="answer-label">Ваш ответ:</label>
            <input type="number" class="answer-input" id="answerInput" placeholder="Введите число..." autocomplete="off">
            <div class="buttons">
              <button class="btn btn-check" onclick="checkAnswer()">✓ Проверить</button>
              <button class="btn btn-next" onclick="nextTask()">🔄 Новая задача</button>
              <button class="btn btn-hint" onclick="showHint()">💡 Подсказка</button>
              <button class="btn btn-solution" onclick="showSolution()">📝 Решение</button>
            </div>
            <div class="result" id="result"></div>
          </div>
        `;

        document
          .getElementById("answerInput")
          .addEventListener("keypress", function (e) {
            if (e.key === "Enter") {
              checkAnswer();
            }
          });

        document.getElementById("answerInput").focus();
      }

      function generateMatrixHTML(matrix, vertices) {
        let html = '<table class="matrix-table">';
        html += "<tr><th></th>";
        for (const v of vertices) {
          html += `<th>${v}</th>`;
        }
        html += "</tr>";

        for (let i = 0; i < vertices.length; i++) {
          html += `<tr><th>${vertices[i]}</th>`;
          for (let j = 0; j < vertices.length; j++) {
            if (matrix[i][j] === null) {
              html += '<td class="empty">-</td>';
            } else {
              html += `<td>${matrix[i][j]}</td>`;
            }
          }
          html += "</tr>";
        }
        html += "</table>";
        return html;
      }

      function checkAnswer() {
        const input = document.getElementById("answerInput");
        const result = document.getElementById("result");
        const userAnswer = parseInt(input.value.trim(), 10);

        if (isNaN(userAnswer)) {
          input.focus();
          return;
        }

        if (userAnswer === currentTask.answer) {
          input.classList.remove("incorrect");
          input.classList.add("correct");
          result.className = "result correct";
          result.innerHTML = `
            <span class="result-icon">🎉</span>
            ПРАВИЛЬНО! Отличная работа!
          `;
          result.style.display = "block";
          result.scrollIntoView({ behavior: "smooth", block: "center" });
        } else {
          input.classList.remove("correct");
          input.classList.add("incorrect");
          result.className = "result incorrect";
          result.innerHTML = `
            <span class="result-icon">😔</span>
            НЕПРАВИЛЬНО!<br>
            <small>Правильный ответ: <strong>${currentTask.answer}</strong></small>
          `;
          result.style.display = "block";
          result.scrollIntoView({ behavior: "smooth", block: "center" });
        }
      }

      function nextTask() {
        generateTask();
      }

      function showHint() {
        const hintBox = document.getElementById("hintBox");
        const hintText = document.getElementById("hintText");

        if (currentTask.viaVertex) {
          hintText.innerHTML = `
            <strong>Разбейте задачу на две части:</strong><br><br>
            1. Найдите кратчайший путь из ${currentTask.startVertex} в ${currentTask.viaVertex}.<br>
            2. Найдите кратчайший путь из ${currentTask.viaVertex} в ${currentTask.endVertex}.<br>
            3. Сложите полученные расстояния.
          `;
        } else {
          hintText.innerHTML = `
            <strong>Переберите все возможные пути:</strong><br><br>
            1. Начните с пункта ${currentTask.startVertex}.<br>
            2. Выпишите все маршруты до ${currentTask.endVertex}.<br>
            3. Посчитайте расстояние для каждого маршрута.<br>
            4. Выберите минимальное.
          `;
        }

        hintBox.style.display = "block";
      }

      function showSolution() {
        const solutionBox = document.getElementById("solutionBox");
        const solutionSteps = document.getElementById("solutionSteps");

        let stepsHTML = "";

        if (currentTask.viaVertex) {
          const { pathsToVia, pathsFromVia, viaVertex } =
            currentTask.solutionPaths;

          stepsHTML = `
            <div class="solution-step">
              <strong>Шаг 1:</strong> Найдём кратчайший путь из ${currentTask.startVertex} в ${viaVertex}:
            </div>
          `;

          for (const p of pathsToVia.slice(0, 4)) {
            const isBest = p.distance === pathsToVia[0].distance;
            stepsHTML += `
              <div class="path-item ${isBest ? "best" : ""}">
                ${p.path.join(" → ")} = ${p.distance} км ${isBest ? "✓" : ""}
              </div>
            `;
          }

          const bestToVia = pathsToVia[0].distance;

          stepsHTML += `
            <div class="solution-step">
              <strong>Шаг 2:</strong> Найдём кратчайший путь из ${viaVertex} в ${currentTask.endVertex}:
            </div>
          `;

          for (const p of pathsFromVia.slice(0, 4)) {
            const isBest = p.distance === pathsFromVia[0].distance;
            stepsHTML += `
              <div class="path-item ${isBest ? "best" : ""}">
                ${p.path.join(" → ")} = ${p.distance} км ${isBest ? "✓" : ""}
              </div>
            `;
          }

          const bestFromVia = pathsFromVia[0].distance;

          stepsHTML += `
            <div class="solution-step">
              <strong>Шаг 3:</strong> Общий путь:<br>
              ${bestToVia} + ${bestFromVia} = <strong>${currentTask.answer}</strong> км
            </div>
            <div class="solution-step" style="background: #e8f5e9; border-left-color: #4caf50;">
              <strong>Ответ: ${currentTask.answer}</strong>
            </div>
          `;
        } else {
          const { allPaths } = currentTask.solutionPaths;

          stepsHTML = `
            <div class="solution-step">
              <strong>Переберём все возможные пути</strong> из ${currentTask.startVertex} в ${currentTask.endVertex}:
            </div>
          `;

          for (const p of allPaths) {
            const isBest = p.distance === allPaths[0].distance;
            stepsHTML += `
              <div class="path-item ${isBest ? "best" : ""}">
                ${p.path.join(" → ")} = ${p.distance} км ${isBest ? "← минимальный!" : ""}
              </div>
            `;
          }

          stepsHTML += `
            <div class="solution-step" style="background: #e8f5e9; border-left-color: #4caf50;">
              <strong>Ответ: ${currentTask.answer}</strong>
            </div>
          `;
        }

        solutionSteps.innerHTML = stepsHTML;
        solutionBox.style.display = "block";
      }

      function hideHintsAndSolution() {
        document.getElementById("hintBox").style.display = "none";
        document.getElementById("solutionBox").style.display = "none";
        document.getElementById("result").style.display = "none";
        const input = document.getElementById("answerInput");
        input.classList.remove("correct", "incorrect");
        input.value = "";
      }

      function scrollToTop() {
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      // Инициализация
      generateTask();
    </script>
  </body>
</html>

      // Перемешиваем массив задач (алгоритм Фишера-Йетса)
      function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
      }

      let shuffledTasks = [];
      let currentTaskIndex = 0;
      let currentTask = null;
      let answeredTasks = new Set();

      function getRandomUnansweredIndex() {
        // Сначала ищем среди неотвеченных
        const unanswered = [];
        for (let i = 0; i < shuffledTasks.length; i++) {
          if (!answeredTasks.has(i)) {
            unanswered.push(i);
          }
        }
        if (unanswered.length > 0) {
          return unanswered[Math.floor(Math.random() * unanswered.length)];
        }
        // Если все отвечены, берём случайную
        return Math.floor(Math.random() * shuffledTasks.length);
      }

      function renderTask(index) {
        const task = shuffledTasks[index];
        currentTask = task;
        currentTaskIndex = index;

        document.getElementById("taskType").textContent = "Задача №" + task.id;
        document.getElementById("taskText").innerHTML = task.text;
        document.getElementById("taskNumber").textContent = task.id;

        const input = document.getElementById("answerInput");
        input.value = "";
        input.className = "answer-input";
        input.disabled = false;

        document.getElementById("result").className = "result";
        document.getElementById("result").innerHTML = "";

        hideHintsAndSolution();

        // Если задача уже отвечена, показываем результат
        if (answeredTasks.has(index)) {
          input.value = task.answer;
          input.className = "answer-input correct";
          input.disabled = true;
          const result = document.getElementById("result");
          result.className = "result correct";
          result.innerHTML = "✅ Правильно!";
        }

        document.getElementById("answerInput").focus();
      }

      function checkAnswer() {
        const input = document.getElementById("answerInput");
        const result = document.getElementById("result");
        const userAnswer = input.value.trim();
        const correctAnswer = currentTask.answer;

        if (!userAnswer) {
          input.focus();
          return;
        }

        if (userAnswer === correctAnswer) {
          input.className = "answer-input correct";
          input.disabled = true;
          result.className = "result correct";
          result.innerHTML = "✅ Правильно! Отличная работа!";
          answeredTasks.add(currentTaskIndex);
        } else {
          input.className = "answer-input incorrect";
          result.className = "result incorrect";
          result.innerHTML =
            "❌ Неправильно. Правильный ответ: <strong>" +
            currentTask.answer +
            "</strong>";
        }
      }

      function nextTask() {
        const newIndex = getRandomUnansweredIndex();
        renderTask(newIndex);
      }

      function showHint() {
        const hintBox = document.getElementById("hintBox");
        const hintText = document.getElementById("hintText");
        hintText.innerHTML = currentTask.hint;
        hintBox.style.display = "block";
        document.getElementById("solutionBox").style.display = "none";
      }

      function showSolution() {
        const solutionBox = document.getElementById("solutionBox");
        const solutionSteps = document.getElementById("solutionSteps");
        solutionSteps.innerHTML = currentTask.solution;
        solutionBox.style.display = "block";
        document.getElementById("hintBox").style.display = "none";
      }

      function hideHintsAndSolution() {
        document.getElementById("hintBox").style.display = "none";
        document.getElementById("solutionBox").style.display = "none";
      }

      function scrollToTop() {
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      // Добавляем обработчик Enter
      document.addEventListener("DOMContentLoaded", function () {
        document
          .getElementById("answerInput")
          .addEventListener("keypress", function (e) {
            if (e.key === "Enter") {
              checkAnswer();
            }
          });
      });

      // Инициализация: перемешиваем задачи и показываем первую случайную
      shuffledTasks = shuffleArray([...tasks]);
      renderTask(getRandomUnansweredIndex());
    </script>

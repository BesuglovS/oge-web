      var cur = 0;

      function genTask() {
        cur = Math.floor(Math.random() * tasks.length);
        task = tasks[cur];
        renderTask(task);
        hideHints();
        var os = document.getElementById("outputSection");
        if (os) os.className = "output-section";
        var numInput = document.getElementById("taskNumInput");
        if (numInput) numInput.value = cur + 1;
      }

      function selectTaskByNumber() {
        var input = document.getElementById("taskNumInput");
        var num = parseInt(input.value);
        if (isNaN(num) || num < 1 || num > tasks.length) {
          alert("Введите номер от 1 до " + tasks.length);
          return;
        }
        cur = num - 1;
        task = tasks[cur];
        renderTask(task);
        hideHints();
        var os = document.getElementById("outputSection");
        if (os) os.className = "output-section";
        document.getElementById("taskCard").scrollIntoView({ behavior: "smooth", block: "start" });
      }

      function getHighlightedText(t) {
        if (t.type === 'end-digit' || t.type === 'end-two') {
          // End-digit/end-two: baseText already has class="highlight" from the template,
          // wrap conditionHighlight in highlight-digit
          if (t.conditionHighlight) {
            return t.conditionText.replace(
              t.conditionHighlight,
              '<span class="highlight-digit">' + t.conditionHighlight + '</span>'
            );
          }
          return t.conditionText;
        }
        if (t.type === 'penult') {
          // Penult: conditionText already has embedded highlight spans
          return t.conditionText;
        }
        // count-digits, sum-digits, minmax: conditionText already has embedded highlight-digit spans
        return t.conditionText;
      }

      function renderTask(t) {
        var c = document.getElementById("taskCard");
        var h =
          '<div class="task-header"><span class="task-type ' +
          t.type +
          '">' +
          t.typeLabel +
          '</span><span class="task-type" style="background:linear-gradient(145deg,#6c757d,#adb5bd);">Задание ' +
          t.id +
          '</span></div><div class="task-text"><p>Напишите программу';
        var isInputUntilZero = t.conditionText.indexOf('(ввод до 0)') !== -1;
        if (t.type == "end-digit" || t.type == "end-two") {
          if (isInputUntilZero) {

          return;
        }
        runBtn.disabled = true;
        runBtn.innerHTML = '<span class="spinner"></span> Выполнение...';
        os.className = "output-section show loading";
        os.innerHTML =
          '<div class="output-title">⏳ Запуск тестов (0/10)...</div><div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div><div class="output-content">Запускаем вашу программу на 10 тестах...</div>';

        var tests = task.tests;
        var results = [];
        var passed = 0;
        var failed = 0;
        var currentTest = 0;

        function runNextTest() {
          if (currentTest >= tests.length) {
            // All tests done
            runBtn.disabled = false;
            runBtn.innerHTML = "▶ Запустить и проверить (10 тестов)";
            showTestResults(results, passed, failed);
            return;
          }

          var test = tests[currentTest];
          var testNum = currentTest + 1;
          var progressBar = document.getElementById("progressBar");
          if (progressBar) {
            progressBar.style.width = (currentTest / tests.length) * 100 + "%";
          }

          var loadingContent = document.querySelector(
            ".output-section.loading .output-content",
          );
          if (loadingContent) {
            loadingContent.textContent =
              "Тест " +
              testNum +
              "/10: " +
              test.input.replace(/\n/g, " ") +
              " → ожидается " +
              test.expected;
          }

          var fd = new FormData();
          fd.append("code", code);
          fd.append("test_input", test.input);
          fd.append("expected_output", test.expected);

          fetch("run_python.php", { method: "POST", body: fd })
            .then(function (r) {
              return r.json();
            })
            .then(function (d) {
              var ok = false;
              var output = "";
              if (d.error) {
                output = "Ошибка: " + d.error;
                ok = false;
              } else if (d.matched) {
                output = d.output;
                ok = true;
              } else {
                output = d.output !== undefined ? d.output : "(пусто)";
                ok = false;
              }
              results.push({
                num: testNum,
                input: test.input,
                expected: test.expected,
                got: output,
                passed: ok,
              });
              if (ok) passed++;
              else failed++;
              currentTest++;
              runNextTest();
            })
            .catch(function (err) {
              results.push({
                num: testNum,
                input: test.input,
                expected: test.expected,
                got: "Ошибка соединения: " + err.message,
                passed: false,
              });
              failed++;
              currentTest++;
              runNextTest();
            });
        }

        runNextTest();
      }

        var h =

          (allPassed

          "</div>";

          '">' +
          "Результат: " +
          passed +

          failed +
          " ✗ из " +
          total +

          var r = results[i];

            esc(r.expected) +
            '</td><td style="font-family:monospace;">' +
            esc(r.got) +
            '</td><td class="' +
            statusClass +
            '">' +
            statusText +
            "</td></tr>";
        }

        h += "</table>";

            '<div class="output-detail" style="margin-top:12px;">💡 Проверьте логику вашей программы. ' +

          "output-section show " + (allPassed ? "success" : "error");
        os.innerHTML = h;

      function runCode() {
        var code = document.getElementById("codeEditor").value.trim();
        var runBtn = document.getElementById("runBtn");
        var os = document.getElementById("outputSection");

          os.className = "output-section show runtime-error";

          '<div class="output-title">⏳ Запуск тестов (0/10)...</div><div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div><div class="output-content">Запускаем вашу программу на 10 тестах...</div>';

        var passed = 0;
        var failed = 0;
        var currentTest = 0;

        function runNextTest() {
          if (currentTest >= tests.length) {
            // All tests done

            runBtn.innerHTML = "▶ Запустить и проверить (10 тестов)";
            showTestResults(results, passed, failed);
            return;

          var testNum = currentTest + 1;
          var progressBar = document.getElementById("progressBar");
          if (progressBar) {
            progressBar.style.width = (currentTest / tests.length) * 100 + "%";
          }

          var loadingContent = document.querySelector(
            ".output-section.loading .output-content",
          );

            loadingContent.textContent =
              "Тест " +
              testNum +
              "/10: " +
              test.input.replace(/\n/g, " ") +
              " → ожидается " +
              test.expected;

          fd.append("test_input", test.input);
          fd.append("expected_output", test.expected);

          fetch("run_python.php", { method: "POST", body: fd })
            .then(function (r) {
              return r.json();
            })
            .then(function (d) {
              var ok = false;
              var output = "";
              if (d.error) {
                output = "Ошибка: " + d.error;
                ok = false;
              } else if (d.matched) {
                output = d.output;
                ok = true;
              } else {
                output = d.output !== undefined ? d.output : "(пусто)";
                ok = false;
              }
              results.push({
                num: testNum,
                input: test.input,
                expected: test.expected,
                got: output,
                passed: ok,
              });
              if (ok) passed++;
              else failed++;
              currentTest++;
              runNextTest();
            })
            .catch(function (err) {
              results.push({
                num: testNum,
                input: test.input,
                expected: test.expected,
                got: "Ошибка соединения: " + err.message,
                passed: false,
              });
              failed++;
              currentTest++;
              runNextTest();
            });
        }

        runNextTest();
      }

      function showTestResults(results, passed, failed) {
        var os = document.getElementById("outputSection");
        var total = results.length;
        var allPassed = failed === 0;

        var h =
          '<div class="output-title">' +
          (allPassed
            ? "✅ Все тесты пройдены!"
            : "❌ Пройдено " + passed + "/" + total + " тестов") +
          "</div>";

        h +=
          '<div class="test-summary ' +
          (allPassed ? "all-pass" : "some-fail") +
          '">' +
          "Результат: " +
          passed +
          " ✓ / " +
          failed +
          " ✗ из " +
          total +
          "</div>";

        h +=
          '<table class="test-results"><tr><th>#</th><th>Входные данные</th><th>Ожидалось</th><th>Получено</th><th>Статус</th></tr>';

        for (var i = 0; i < results.length; i++) {
          var r = results[i];
          var statusClass = r.passed ? "pass" : "fail";
          var statusText = r.passed ? "✓" : "✗";
          h +=
            "<tr><td>" +
            r.num +
            '</td><td style="font-size:0.85rem;font-family:monospace;">' +
            esc(r.input.replace(/\n/g, " ")) +
            '</td><td style="font-family:monospace;">' +
            esc(r.expected) +
            '</td><td style="font-family:monospace;">' +
            esc(r.got) +
            '</td><td class="' +
            statusClass +
            '">' +
            statusText +
            "</td></tr>";
        }

        h += "</table>";

        if (!allPassed) {
          h +=
            '<div class="output-detail" style="margin-top:12px;">💡 Проверьте логику вашей программы. ' +
            "Обратите внимание на тесты, которые не прошли.</div>";
        }

        os.className =
          "output-section show " + (allPassed ? "success" : "error");
        os.innerHTML = h;
      }

      function nextTask() {
        genTask();
      }

      function showHint() {
        document.getElementById("hintBox").style.display = "block";
        document.getElementById("hintText").innerHTML = task.hint;
      }

      function showSolution() {
        var sb = document.getElementById("solutionBox");
        var ss = document.getElementById("solutionSteps");
        var sc = task.solutionCode;
        ss.innerHTML =
          '<div class="solution-step"><strong>Программа на Python:</strong><div class="code-block-display">' +
          sc.replace(/\n/g, "<br>").replace(/  /g, "&nbsp;&nbsp;") +
          '</div></div><div class="solution-step" style="background:#e8f5e9;border-left-color:#4caf50;"><strong>Ожидаемый результат: ' +
          task.testData.expected +
          '</strong></div><div class="solution-step"><strong>💡 Как это работает:</strong><br>Программа считывает данные, обрабатывает каждое число, проверяет условие и накапливает результат. В конце выводит его.</div>';
        sb.style.display = "block";
      }

      function hideHints() {
        document.getElementById("hintBox").style.display = "none";
        document.getElementById("solutionBox").style.display = "none";
      }

      function scrollToTop() {
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      function esc(s) {
        var d = document.createElement("div");
        d.textContent = s;
        return d.innerHTML;
      }

      genTask();
    </script>
  </body>
</html>

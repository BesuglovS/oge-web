          itemNamePlural: "химические элементы",
          itemNameInstrumental: "названиями химических элементов",

        {

          person: "Лена",
          items: [
            "роза",

          ],
          itemName: "цветок",
          itemNameAccusative: "один цветок",
          itemNamePlural: "цветы",
          itemNameInstrumental: "названиями цветов",
          itemAdded: "добавленный цветок",
          itemDeleted: "удалённый цветок",
        },
        {
          theme: "геологии",
          person: "Кирилл",
          items: [
            "кварц",
            "полевой шпат",
            "слюда",
            "кальцит",
            "гипс",
            "галит",
            "пирит",
            "магнетит",
            "гематит",
            "графит",
            "сера",
            "тальк",
          ],
          itemName: "минерал",
          itemNameAccusative: "один минерал",
          itemNamePlural: "минералы",
          itemNameInstrumental: "названиями минералов",
          itemAdded: "добавленный минерал",
          itemDeleted: "удалённый минерал",
        },
      ];

      const units = ["бит", "байт"];
      const operations = ["delete", "add"];

      let currentTask = null;

      // Генерация задачи
      function generateTask() {
        const encoding =
          encodings[Math.floor(Math.random() * encodings.length)];
        const subject = subjects[Math.floor(Math.random() * subjects.length)];
        const operation =
          operations[Math.floor(Math.random() * operations.length)];
        const unit = units[Math.floor(Math.random() * units.length)];

        // Выбираем элементы для списка с уникальными длинами
        const shuffledItems = [...subject.items].sort(
          () => Math.random() - 0.5,
        );
        const itemCount = Math.floor(Math.random() * 3) + 4; // 4-6 элементов

        // Выбираем элементы так, чтобы все имели разную длину
        const selectedItems = [];
        const usedLengths = new Set();

        for (const item of shuffledItems) {
          if (selectedItems.length >= itemCount) break;
          if (!usedLengths.has(item.length)) {
            selectedItems.push(item);
            usedLengths.add(item.length);
          }
        }

        // Если не набрали минимум 4 элемента с уникальными длинами,
        // выбираем другую тему (иначе ответ не будет однозначным)
        if (selectedItems.length < 4) {
          return generateTask();
        }

        // Выбираем целевой элемент (тот, который будет удалён или добавлен)
        const targetItem =
          selectedItems[Math.floor(Math.random() * selectedItems.length)];
        const targetLength = targetItem.length;

        // Вычисляем изменение объёма
        // При удалении/добавлении слова: слово + запятая + пробел = длина + 2
        const charCount = targetLength + 2;
        let sizeChange;

        if (unit === "бит") {
          sizeChange = charCount * encoding.bits;
        } else {
          sizeChange = charCount * encoding.bytes;
        }

        // Формируем текст задачи
        let taskText = "";
        let itemsInText;

        if (operation === "delete") {
          itemsInText = selectedItems.join(", ");
          taskText = generateDeleteTask(
            encoding,
            subject,
            itemsInText,
            targetItem,
            sizeChange,
            unit,
          );
        } else {
          // Для добавления показываем текст ПОСЛЕ добавления (со всеми элементами)
          itemsInText = selectedItems.join(", ");
          taskText = generateAddTask(
            encoding,
            subject,
            itemsInText,
            targetItem,
            sizeChange,
            unit,
          );
        }

        currentTask = {
          answer: targetItem,
          encoding: encoding,
          charCount: charCount,
          sizeChange: sizeChange,
          unit: unit,
          operation: operation,
          targetLength: targetLength,
        };

        renderTask(taskText, operation, subject.itemName);
        hideHintsAndSolution();
      }

      function generateDeleteTask(
        encoding,
        subject,
        itemsInText,
        targetItem,
        sizeChange,
        unit,
      ) {
        const encodingDesc = encoding.description
          ? `${encoding.name} (${encoding.description})`
          : encoding.name;

        return `
          <p>В одной из кодировок ${encodingDesc} каждый символ кодируется <span class="highlight">${encoding.bits} битами</span>.</p>
          <p>При подготовке сообщения по ${subject.theme} ${subject.person} написал текст (в нём нет лишних пробелов):</p>
          <div class="quote">«Такие ${subject.itemNamePlural}, как ${itemsInText}, известны многим.»</div>
          <p>Затем ${subject.person} удалил из списка ${subject.itemNameAccusative}, а также лишние запятую и пробел — два пробела не должны идти подряд.</p>
          <p>При этом размер нового предложения в данной кодировке оказался на <span class="highlight">${sizeChange} ${unit}</span> меньше, чем размер исходного предложения.</p>
          <p>Напишите в ответе ${subject.itemDeleted}.</p>
        `;
      }

      function generateAddTask(
        encoding,
        subject,
        itemsInText,
        targetItem,
        sizeChange,
        unit,
      ) {
        const encodingDesc = encoding.description
          ? `${encoding.name} (${encoding.description})`
          : encoding.name;

        return `
          <p>В одной из кодировок ${encodingDesc} каждый символ кодируется <span class="highlight">${encoding.bits} битами</span>.</p>
          <p>При подготовке реферата по ${subject.theme} ${subject.person} написал текст с ${subject.itemNameInstrumental}. Затем ${subject.person} добавил в текст ещё ${subject.itemNameAccusative}, вставив также необходимые пробелы и знаки препинания, после чего текст стал таким:</p>
          <div class="quote">«Такие ${subject.itemNamePlural}, как ${itemsInText}, известны многим.»</div>
          <p>При этом размер нового предложения в данной кодировке оказался на <span class="highlight">${sizeChange} ${unit}</span> больше, чем размер исходного предложения.</p>
          <p>Напишите в ответе ${subject.itemAdded}.</p>
        `;
      }

      function renderTask(taskText, operation, itemName) {
        const taskCard = document.getElementById("taskCard");
        const typeLabel =
          operation === "delete" ? "Удаление слова" : "Добавление слова";
        const typeClass = operation === "delete" ? "delete" : "add";

        taskCard.innerHTML = `
          <div class="task-header">
            <span class="task-type ${typeClass}">${typeLabel}</span>
          </div>
          <div class="task-text">${taskText}</div>
          <div class="answer-section">
            <label class="answer-label">Ваш ответ:</label>
            <input type="text" class="answer-input" id="answerInput" placeholder="Введите ${itemName}..." autocomplete="off">
            <div class="buttons">
              <button class="btn btn-check" onclick="checkAnswer()">✓ Проверить</button>
              <button class="btn btn-next" onclick="nextTask()">🔄 Новая задача</button>
              <button class="btn btn-hint" onclick="showHint()">💡 Подсказка</button>
              <button class="btn btn-solution" onclick="showSolution()">📝 Решение</button>
            </div>
            <div class="result" id="result"></div>
          </div>
        `;

        // Добавляем обработчик Enter
        document
          .getElementById("answerInput")
          .addEventListener("keypress", function (e) {
            if (e.key === "Enter") {
              checkAnswer();
            }
          });

        document.getElementById("answerInput").focus();
      }

      function checkAnswer() {
        const input = document.getElementById("answerInput");
        const result = document.getElementById("result");
        const userAnswer = input.value.trim().toLowerCase();
        const correctAnswer = currentTask.answer.toLowerCase();

        if (!userAnswer) {
          input.focus();
          return;
        }

        if (userAnswer === correctAnswer) {
          input.classList.remove("incorrect");
          input.classList.add("correct");
          result.className = "result correct";
          result.innerHTML = "✅ Правильно! Отличная работа!";
        } else {
          input.classList.remove("correct");
          input.classList.add("incorrect");
          result.className = "result incorrect";
          result.innerHTML = `❌ Неправильно. Правильный ответ: <strong>${currentTask.answer}</strong>`;
        }
      }

      function nextTask() {
        generateTask();
      }

      function showHint() {
        const hintBox = document.getElementById("hintBox");
        const hintText = document.getElementById("hintText");

        // Размер символа в тех же единицах, что и изменение объёма
        const charSize =
          currentTask.unit === "бит"
            ? currentTask.encoding.bits
            : currentTask.encoding.bytes;

        hintText.innerHTML = `
          <strong>Шаг 1:</strong> Определите размер одного символа.<br>
          В данной кодировке один символ = ${charSize} ${currentTask.unit}.<br><br>
          <strong>Шаг 2:</strong> Найдите количество изменённых символов.<br>
          Изменение объёма = ${currentTask.sizeChange} ${currentTask.unit}.<br>
          Количество символов = ${currentTask.sizeChange} ÷ ${charSize} = ${currentTask.charCount} символов.<br><br>
          <strong>Шаг 3:</strong> Вычтите 2 символа (запятая и пробел).<br>
          Длина слова = ${currentTask.charCount} - 2 = ${currentTask.targetLength} символов.<br><br>
          <strong>Шаг 4:</strong> Найдите в тексте слово из ${currentTask.targetLength} символов.
        `;

        hintBox.style.display = "block";
      }

      function showSolution() {
        const solutionBox = document.getElementById("solutionBox");
        const solutionSteps = document.getElementById("solutionSteps");

        const operation =
          currentTask.operation === "delete" ? "удалено" : "добавлено";
        const operationWord =
          currentTask.operation === "delete" ? "удалении" : "добавлении";

        // Размер символа в тех же единицах, что и изменение объёма
        const charSize =
          currentTask.unit === "бит"
            ? currentTask.encoding.bits
            : currentTask.encoding.bytes;

        solutionSteps.innerHTML = `
          <div class="solution-step">
            <strong>1. Определяем размер одного символа:</strong><br>
            В кодировке ${currentTask.encoding.name} каждый символ кодируется ${currentTask.encoding.bits} бит = ${currentTask.encoding.bytes} байт.<br>
            Размер одного символа = ${charSize} ${currentTask.unit}.
          </div>
          <div class="solution-step">
            <strong>2. Находим количество изменённых символов:</strong><br>
            При ${operationWord} слова размер изменился на ${currentTask.sizeChange} ${currentTask.unit}.<br>
            Количество символов = ${currentTask.sizeChange} ${currentTask.unit} ÷ ${charSize} ${currentTask.unit} = ${currentTask.charCount} символов.
          </div>
          <div class="solution-step">
            <strong>3. Вычисляем длину искомого слова:</strong><br>
            При ${operationWord} слова также ${operation === "удалено" ? "удаляются" : "добавляются"} запятая и пробел (+2 символа).<br>
            Длина слова = ${currentTask.charCount} - 2 = ${currentTask.targetLength} символов.
          </div>
          <div class="solution-step">
            <strong>4. Находим слово нужной длины:</strong><br>
            Ищем в тексте слово из ${currentTask.targetLength} символов.<br>
            Это слово: <strong>${currentTask.answer}</strong>
          </div>
          <div class="solution-step" style="background: #e8f5e9; border-left-color: #4caf50;">
            <strong>Ответ: ${currentTask.answer}</strong>
          </div>
        `;

        solutionBox.style.display = "block";
      }

      function hideHintsAndSolution() {
        document.getElementById("hintBox").style.display = "none";
        document.getElementById("solutionBox").style.display = "none";
      }

      function scrollToTop() {
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      // Инициализация
      generateTask();
    </script>
  </body>
</html>
